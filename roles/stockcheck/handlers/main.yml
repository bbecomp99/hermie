---
- name: Restart hermes gateway for stockcheck
  ansible.builtin.systemd:
    name: "{{ stockcheck_gateway_service }}"
    scope: user
    state: restarted
    daemon_reload: true
  environment:
    XDG_RUNTIME_DIR: "/run/user/{{ uid_cmd.stdout }}"
    DBUS_SESSION_BUS_ADDRESS: "unix:path=/run/user/{{ uid_cmd.stdout }}/bus"
