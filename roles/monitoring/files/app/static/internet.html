<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Argus · Internet QoS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&display=swap" rel="stylesheet">
    <style>
        /* ── Argus theme: Obsidian & Bronze (a temple at night) ── */
        :root {
            --obsidian:#0b0d11; --stone:#15171d; --stone2:#1b1e26;
            --bronze:#c9a227; --bronze-hi:#e7c869; --aegean:#2a9d8f;
            --azure:#38bdf8; --parchment:#ece6d6; --tan:#9d9482;
        }
        body {
            background:
                radial-gradient(1100px 560px at 50% -12%, rgba(201,162,39,.07), transparent 60%),
                radial-gradient(900px 520px at 100% 0%, rgba(56,189,248,.06), transparent 55%),
                var(--obsidian);
            color: var(--parchment);
            font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }
        h1, h2, .cinzel { font-family: 'Cinzel', Georgia, 'Times New Roman', serif; letter-spacing: .045em; }
        .tagline { font-family: 'Cormorant Garamond', Georgia, serif; font-style: italic; letter-spacing: .02em; }

        .glass {
            background:
                linear-gradient(180deg, rgba(255,255,255,.025), rgba(0,0,0,.12)),
                linear-gradient(145deg, var(--stone2), var(--stone));
            border: 1px solid rgba(201,162,39,.18);
            box-shadow: inset 0 1px 0 rgba(255,255,255,.045), 0 10px 28px rgba(0,0,0,.38);
        }
        .azure { background: linear-gradient(92deg, #7dd3fc, var(--azure) 60%, #0ea5e9);
                 -webkit-background-clip: text; background-clip: text; color: transparent; }

        .cornice {
            height: 12px; opacity: .85;
            background:
                linear-gradient(var(--bronze),var(--bronze)) left top/100% 1.5px no-repeat,
                linear-gradient(var(--bronze),var(--bronze)) left bottom/100% 1.5px no-repeat,
                repeating-linear-gradient(90deg, var(--bronze) 0 5px, transparent 5px 11px) center/100% 5px no-repeat;
        }
        .medallion { border: 1.5px solid rgba(201,162,39,.55); border-radius: 9999px;
                     box-shadow: inset 0 0 12px rgba(201,162,39,.18), 0 0 0 4px rgba(201,162,39,.06); }

        ::-webkit-scrollbar { width: 9px; height: 9px; }
        ::-webkit-scrollbar-track { background: rgba(0,0,0,.25); }
        ::-webkit-scrollbar-thumb { background: linear-gradient(var(--bronze),#8a6d1a); border-radius: 6px; }

        @keyframes shimmer { 0% { background-position: -800px 0; } 100% { background-position: 800px 0; } }
        .skel { background: linear-gradient(90deg, #1b1e26 25%, #2a2c1f 50%, #1b1e26 75%); background-size: 800px 100%; animation: shimmer 1.4s ease-in-out infinite; display: inline-block; }
        @keyframes pulsedot { 0%,100% { opacity: 1; } 50% { opacity: 0.35; } }
        .live { animation: pulsedot 1.6s ease-in-out infinite; }

        .kv { display:flex; justify-content:space-between; padding:.35rem 0; border-bottom:1px solid rgba(201,162,39,.10); font-size:.8rem; }
        .kv span:first-child { color: var(--tan); }
        .kv span:last-child { color:#dcd4c2; font-weight:600; font-variant-numeric: tabular-nums; }

        /* warm the neutral slate ramp → stone/parchment (keeps status colours intact) */
        .text-white{color:var(--parchment)!important}
        .text-slate-200{color:#dad2c0!important}
        .text-slate-300{color:#c4bca9!important}
        .text-slate-400{color:#9d9482!important}
        .text-slate-500{color:#857c6b!important}
        .text-slate-600{color:#6b6353!important}
        .bg-slate-900{background-color:#0f1116!important}
        .bg-slate-800{background-color:#191c23!important}
        .bg-slate-700{background-color:#23262f!important}
        .hover\:bg-slate-600:hover{background-color:#2d313c!important}
        .hover\:bg-slate-800:hover{background-color:#191c23!important}
        .border-slate-600{border-color:rgba(201,162,39,.24)!important}
        .border-slate-700{border-color:rgba(201,162,39,.16)!important}
        .border-slate-800{border-color:rgba(201,162,39,.10)!important}
    </style>
</head>
<body class="p-6 min-h-screen flex flex-col">
    <nav class="glass sticky top-0 z-50 px-6 pt-4 pb-0 mb-6 rounded-xl shadow-lg overflow-hidden">
        <div class="flex justify-between items-center">
            <div class="flex items-center gap-4">
                <a href="./index.html" class="text-slate-400 hover:text-white transition text-sm font-semibold flex items-center gap-1" title="Back to Argus">← <span class="hidden sm:inline cinzel">ARGUS</span></a>
                <span class="medallion w-11 h-11 flex items-center justify-center text-xl leading-none select-none">🌐</span>
                <div>
                    <h1 class="text-2xl font-bold azure">Internet QoS</h1>
                    <p class="tagline text-sm text-slate-400 mt-0.5" id="hostline">watching the wires…</p>
                </div>
            </div>
            <div class="flex items-center space-x-4">
                <div class="flex items-center gap-2">
                    <span class="w-2.5 h-2.5 rounded-full bg-slate-500" id="statusDot"></span>
                    <span class="text-sm font-bold text-slate-400" id="statusText">…</span>
                </div>
                <p class="text-sm text-slate-400" id="refreshTime"></p>
                <button onclick="load()" class="bg-slate-700 hover:bg-slate-600 text-white text-sm font-semibold py-2 px-3 rounded-lg transition shadow-md" style="border:1px solid rgba(201,162,39,.25)">Refresh ↻</button>
            </div>
        </div>
        <div class="cornice mt-4"></div>
    </nav>

    <main class="w-full flex-grow" id="content"></main>

    <script>
        const REFRESH_MS = 5000;
        let trendRange = 6;        // hours shown in the latency chart
        let trend = { names: [], series: {} };
        let thresholds = { poor_ms: 400, degrade_ms: 800 };
        const RANGES = [{ h: 1, l: '1H' }, { h: 6, l: '6H' }, { h: 24, l: '1D' }, { h: 168, l: '1W' }];
        // stable per-series colour palette (assigned by sorted URL name)
        const PALETTE = ['#38bdf8', '#34d399', '#f59e0b', '#a78bfa', '#f472b6', '#fb7185', '#22d3ee', '#facc15'];
        const colorOf = (name) => PALETTE[[...trend.names].sort().indexOf(name) % PALETTE.length] || '#38bdf8';

        const fmtAge = (iso) => {
            if (!iso) return '—';
            const m = Math.floor((Date.now() - new Date(iso).getTime()) / 60000);
            if (m < 1) return 'just now';
            if (m < 60) return m + 'm ago';
            if (m < 1440) return Math.floor(m / 60) + 'h ' + (m % 60) + 'm ago';
            return Math.floor(m / 1440) + 'd ago';
        };
        const ms = (v) => (v === null || v === undefined) ? '—' : v + 'ms';
        // latency → colour (lower is better): green < poor, amber < degrade, else red
        const latColor = (v) => v == null ? 'text-slate-400' : v < thresholds.poor_ms ? 'text-emerald-400' : v < thresholds.degrade_ms ? 'text-amber-400' : 'text-red-400';
        const latBorder = (v) => v == null ? 'border-slate-600' : v < thresholds.poor_ms ? 'border-emerald-500' : v < thresholds.degrade_ms ? 'border-amber-500' : 'border-red-500';
        const upColor = (v) => v == null ? 'text-slate-400' : v >= 99.5 ? 'text-emerald-400' : v >= 98 ? 'text-amber-400' : 'text-red-400';

        function sparkline(hist) {
            if (!hist || !hist.length) return '';
            return hist.slice(-40).map(v =>
                `<span class="inline-block w-1 rounded-sm ${v ? 'bg-emerald-500/70' : 'bg-red-500'}" style="height:${v ? 14 : 6}px;vertical-align:bottom;"></span>`
            ).join('');
        }
        function stat(label, value, valueColor, accent, sub='') {
            return `<div class="glass p-5 rounded-xl border-b-4 ${accent} shadow-md">
                <p class="text-xs uppercase text-slate-400 mb-1 font-semibold tracking-wider">${label}</p>
                <p class="text-2xl font-bold ${valueColor} leading-tight">${value}</p>
                ${sub ? `<p class="text-xs text-slate-500 mt-1">${sub}</p>` : ''}</div>`;
        }
        const row = (k, v) => `<div class="kv"><span>${k}</span><span>${v}</span></div>`;

        // ---- range-selectable latency trend (one line per URL, from history) ----
        async function loadTrend() {
            try { const r = await fetch('/api/internet/history?hours=' + trendRange); trend = await r.json(); }
            catch (e) { trend = { names: [], series: {} }; }
            drawTrend();
        }
        function setRange(h) { trendRange = h; loadTrend(); }
        window.setRange = setRange;
        function rangeButtons() {
            return RANGES.map(r => {
                const on = r.h === trendRange;
                return `<button onclick="setRange(${r.h})" class="px-3 py-1 rounded-lg text-xs font-bold transition ${on ? 'bg-sky-600 text-white shadow' : 'bg-slate-700 text-slate-300 hover:bg-slate-600'}">${r.l}</button>`;
            }).join('');
        }
        const fmtTs = (ts) => {
            const d = new Date(ts * 1000);
            return trendRange <= 24
                ? d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
                : d.toLocaleString([], { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
        };
        function drawTrend() {
            const el = document.getElementById('trendChart');
            if (!el) return;
            const peakEl = document.getElementById('trendPeak');
            const axisEl = document.getElementById('trendAxis');
            const legEl = document.getElementById('trendLegend');
            // gather successful-probe latencies across every series
            let tMin = Infinity, tMax = -Infinity, yMax = 0, total = 0;
            (trend.names || []).forEach(n => (trend.series[n] || []).forEach(p => {
                if (p.status !== 'up' || p.latency_ms == null) return;
                total++;
                if (p.ts < tMin) tMin = p.ts; if (p.ts > tMax) tMax = p.ts;
                if (p.latency_ms > yMax) yMax = p.latency_ms;
            }));
            if (legEl) legEl.innerHTML = (trend.names || []).map(n =>
                `<span class="flex items-center gap-1.5 text-xs text-slate-400"><span class="inline-block w-3 h-[2px]" style="background:${colorOf(n)}"></span>${n}</span>`).join('');
            if (total < 2 || tMax <= tMin) {
                el.innerHTML = '<div class="h-32 flex items-center justify-center text-slate-600 text-sm">no samples in this range yet…</div>';
                if (peakEl) peakEl.innerText = '';
                if (axisEl) axisEl.innerHTML = '';
                return;
            }
            yMax = Math.max(yMax, 50);
            const W = 600, H = 130;
            const lines = (trend.names || []).map(n => {
                const pts = (trend.series[n] || [])
                    .filter(p => p.status === 'up' && p.latency_ms != null)
                    .map(p => `${(((p.ts - tMin) / (tMax - tMin)) * W).toFixed(1)},${(H - (p.latency_ms / yMax) * (H - 4) - 2).toFixed(1)}`);
                return pts.length < 2 ? '' : `<polyline fill="none" stroke="${colorOf(n)}" stroke-width="1.5" vector-effect="non-scaling-stroke" points="${pts.join(' ')}"/>`;
            }).join('');
            el.innerHTML = `<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" class="w-full h-32">
                <line x1="0" y1="2" x2="${W}" y2="2" stroke="#334155" stroke-width="0.5" vector-effect="non-scaling-stroke"/>
                <line x1="0" y1="${H/2}" x2="${W}" y2="${H/2}" stroke="#1e293b" stroke-width="0.5" vector-effect="non-scaling-stroke"/>
                ${lines}
            </svg>`;
            if (peakEl) peakEl.innerText = `0–${yMax.toFixed(0)} ms · ${total} pts`;
            if (axisEl) axisEl.innerHTML = `<span>${fmtTs(tMin)}</span><span>${fmtTs(tMax)}</span>`;
        }

        function showSkeletons() {
            document.getElementById('content').innerHTML = `
                <div class="grid grid-cols-2 md:grid-cols-4 gap-6 mb-8">
                    ${Array(4).fill('<div class="glass p-5 rounded-xl border-b-4 border-slate-700"><div class="skel rounded mb-2" style="height:.7rem;width:60%"></div><div class="skel rounded" style="height:1.6rem;width:50%"></div></div>').join('')}
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4">
                    ${Array(2).fill('<div class="glass p-5 rounded-xl border-t-4 border-slate-700"><div class="skel rounded mb-3" style="height:.8rem;width:40%"></div>'+Array(4).fill('<div class="skel rounded mb-2" style="height:.7rem;width:90%"></div>').join('')+'</div>').join('')}
                </div>`;
        }

        function urlCard(u) {
            const q = u.qos || {};
            const down = u.status === 'down';
            const degraded = u.status === 'degraded';
            const unknown = u.status === 'unknown';
            const dot = unknown ? 'bg-slate-500' : (down ? 'bg-red-500 live' : (degraded ? 'bg-amber-400 live' : 'bg-emerald-400 live'));
            const statusText = unknown ? 'UNKNOWN' : (down ? 'DOWN' : (degraded ? 'SLOW' : 'UP'));
            const statusColor = unknown ? 'text-slate-400' : (down ? 'text-red-400' : (degraded ? 'text-amber-400' : 'text-emerald-400'));
            const border = down ? 'border-red-500' : latBorder(u.latency_ms);
            return `<div class="glass p-5 rounded-xl border-t-4 ${border} shadow-md">
                <div class="flex justify-between items-start mb-1">
                    <div class="flex items-center gap-2">
                        <span class="w-2.5 h-2.5 rounded-full ${dot}"></span>
                        <span class="font-bold text-white text-lg">${u.name}</span>
                    </div>
                    <span class="text-xs font-bold ${statusColor}">${statusText}</span>
                </div>
                <p class="text-xs text-slate-500 truncate mb-3" title="${u.label}">${u.label}</p>
                <div class="flex items-end gap-0.5 h-4 mb-3">${sparkline(u.spark)}</div>
                <div class="flex items-baseline justify-between mb-2">
                    <span class="text-3xl font-bold ${down ? 'text-red-400' : latColor(u.latency_ms)}">${ms(u.latency_ms)}</span>
                    <span class="text-xs text-slate-500">${down ? (u.detail || 'unreachable') : 'now · ' + fmtAge(u.last_checked)}</span>
                </div>
                ${row('Uptime', `<span class="${upColor(q.uptime_pct)}">${q.uptime_pct == null ? '—' : q.uptime_pct + '%'}</span>`)}
                ${row('Avg latency', `<span class="${latColor(q.avg_ms)}">${ms(q.avg_ms)}</span>`)}
                ${row('p95 latency', `<span class="${latColor(q.p95_ms)}">${ms(q.p95_ms)}</span>`)}
                ${row('Jitter', ms(q.jitter_ms))}
                ${row('Min / Max', `${ms(q.min_ms)} / ${ms(q.max_ms)}`)}
                ${row('Samples (1h)', q.samples == null ? '—' : q.samples)}</div>`;
        }

        function render(d) {
            document.getElementById('refreshTime').innerText = 'Updated ' + new Date(d.generated).toLocaleTimeString();
            if (!d.ok || !d.urls) {
                document.getElementById('statusDot').className = 'w-2.5 h-2.5 rounded-full bg-red-500 live';
                document.getElementById('statusText').className = 'text-sm font-bold text-red-400';
                document.getElementById('statusText').innerText = 'NO DATA';
                document.getElementById('content').innerHTML = `<div class="glass p-8 rounded-xl border-l-4 border-red-500 text-center"><p class="text-red-400 font-bold text-lg mb-2">Internet QoS unavailable</p><p class="text-slate-400 text-sm font-mono">${(d && d.error) || 'no internet-group targets configured'}</p></div>`;
                return;
            }
            thresholds = d.thresholds || thresholds;
            const s = d.summary;
            const anyDown = s.down > 0, anyDeg = s.degraded > 0;
            const oStatus = anyDown ? 'down' : (anyDeg ? 'degraded' : 'up');
            document.getElementById('statusDot').className = 'w-2.5 h-2.5 rounded-full live ' + (anyDown ? 'bg-red-500' : anyDeg ? 'bg-amber-400' : 'bg-emerald-400');
            document.getElementById('statusText').className = 'text-sm font-bold ' + (anyDown ? 'text-red-400' : anyDeg ? 'text-amber-400' : 'text-emerald-400');
            document.getElementById('statusText').innerText = anyDown ? 'DEGRADED' : anyDeg ? 'SLOW' : 'HEALTHY';
            document.getElementById('hostline').innerText = `${s.total} URL${s.total === 1 ? '' : 's'} tracked · ${s.up} up · slow over ${thresholds.degrade_ms}ms`;

            const ups = d.urls.map(u => u.qos && u.qos.uptime_pct).filter(v => v != null);
            const avgUp = ups.length ? (ups.reduce((a, b) => a + b, 0) / ups.length) : null;
            const p95s = d.urls.map(u => u.qos && u.qos.p95_ms).filter(v => v != null);
            const worstP95 = p95s.length ? Math.max(...p95s) : null;

            const stats = `<div class="grid grid-cols-2 md:grid-cols-4 gap-6 mb-8">
                ${stat('Avg uptime', avgUp == null ? '—' : avgUp.toFixed(1) + '%', upColor(avgUp), 'border-sky-500', 'across tracked URLs (1h)')}
                ${stat('Avg latency', ms(s.avg_ms), latColor(s.avg_ms), latBorder(s.avg_ms), 'mean response time (1h)')}
                ${stat('Worst p95', ms(worstP95), latColor(worstP95), latBorder(worstP95), 'slowest 95th-pct endpoint')}
                ${stat('Endpoints up', `${s.up} / ${s.total}`, anyDown ? 'text-red-400' : anyDeg ? 'text-amber-400' : 'text-emerald-400', anyDown ? 'border-red-500' : anyDeg ? 'border-amber-500' : 'border-emerald-500', anyDeg ? s.degraded + ' slow' : 'all reachable')}
            </div>`;

            const trendHtml = `<div class="glass p-5 rounded-xl border-t-4 border-sky-500 shadow-md mb-8">
                <div class="flex justify-between items-center mb-3 flex-wrap gap-2">
                    <div class="flex items-center gap-4 flex-wrap">
                        <h3 class="text-xs uppercase tracking-wider font-bold text-slate-400">Latency trend</h3>
                        <span id="trendLegend" class="flex items-center gap-4 flex-wrap"></span>
                        <span class="text-xs text-slate-500" id="trendPeak"></span>
                    </div>
                    <div class="flex gap-1.5">${rangeButtons()}</div>
                </div>
                <div id="trendChart"></div>
                <div class="flex justify-between text-[10px] text-slate-500 mt-1" id="trendAxis"></div>
            </div>`;

            const trendSection = `<div class="mb-2"><h2 class="text-xl font-bold text-white flex items-center"><span class="w-2 h-6 bg-sky-500 rounded-full mr-3"></span>Quality of service</h2>
                <p class="text-xs text-slate-500 mt-1 ml-5">Per-cycle response time + reachability for the global URL trackers, sampled every probe cycle and persisted to SQLite. A URL that answers but slower than ${thresholds.degrade_ms}ms counts as "slow" (degraded).</p></div>
                <div class="mt-4">${trendHtml}</div>`;

            const cards = `<div class="mb-2"><h2 class="text-xl font-bold text-white flex items-center"><span class="w-2 h-6 bg-emerald-500 rounded-full mr-3"></span>Tracked URLs</h2></div>
                <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4 mt-4 mb-8">${d.urls.map(urlCard).join('')}</div>`;

            document.getElementById('content').innerHTML = stats + trendSection + cards;
            drawTrend();
        }

        async function load() {
            try {
                const res = await fetch('/api/internet');
                render(await res.json());
            } catch (err) {
                render({ ok: false, generated: new Date().toISOString(), error: String(err) });
            }
        }

        showSkeletons();
        loadTrend().then(load);              // history chart first, then live page
        setInterval(load, REFRESH_MS);       // live state every 5s
        setInterval(loadTrend, 60000);       // latency history refresh
    </script>
</body>
</html>
