<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Argus · Kafka</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&display=swap" rel="stylesheet">
    <style>
        /* ── Argus theme: Obsidian & Bronze (a temple at night) ── */
        :root {
            --obsidian:#0b0d11; --stone:#15171d; --stone2:#1b1e26;
            --bronze:#c9a227; --bronze-hi:#e7c869; --copper:#e08a4a;
            --copper-hi:#f0a868; --parchment:#ece6d6; --tan:#9d9482;
        }
        body {
            background:
                radial-gradient(1100px 560px at 50% -12%, rgba(201,162,39,.07), transparent 60%),
                radial-gradient(900px 520px at 100% 0%, rgba(224,138,74,.06), transparent 55%),
                var(--obsidian);
            color: var(--parchment);
            font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }
        h1, h2, .cinzel { font-family: 'Cinzel', Georgia, 'Times New Roman', serif; letter-spacing: .045em; }
        .tagline { font-family: 'Cormorant Garamond', Georgia, serif; font-style: italic; letter-spacing: .02em; }

        .glass {
            background:
                linear-gradient(180deg, rgba(255,255,255,.025), rgba(0,0,0,.12)),
                linear-gradient(145deg, var(--stone2), var(--stone));
            border: 1px solid rgba(201,162,39,.18);
            box-shadow: inset 0 1px 0 rgba(255,255,255,.045), 0 10px 28px rgba(0,0,0,.38);
        }
        .iris { background: linear-gradient(92deg, var(--copper-hi), var(--copper) 60%, #c2703a);
                -webkit-background-clip: text; background-clip: text; color: transparent; }

        .cornice {
            height: 12px; opacity: .85;
            background:
                linear-gradient(var(--bronze),var(--bronze)) left top/100% 1.5px no-repeat,
                linear-gradient(var(--bronze),var(--bronze)) left bottom/100% 1.5px no-repeat,
                repeating-linear-gradient(90deg, var(--bronze) 0 5px, transparent 5px 11px) center/100% 5px no-repeat;
        }
        .medallion { border: 1.5px solid rgba(201,162,39,.55); border-radius: 9999px;
                     box-shadow: inset 0 0 12px rgba(201,162,39,.18), 0 0 0 4px rgba(201,162,39,.06);
                     font-family:'Cinzel',serif; color:var(--copper-hi); }

        ::-webkit-scrollbar { width: 9px; height: 9px; }
        ::-webkit-scrollbar-track { background: rgba(0,0,0,.25); }
        ::-webkit-scrollbar-thumb { background: linear-gradient(var(--bronze),#8a6d1a); border-radius: 6px; }

        @keyframes shimmer { 0% { background-position: -800px 0; } 100% { background-position: 800px 0; } }
        .skel { background: linear-gradient(90deg, #1b1e26 25%, #2a2c1f 50%, #1b1e26 75%); background-size: 800px 100%; animation: shimmer 1.4s ease-in-out infinite; display: inline-block; }
        @keyframes pulsedot { 0%,100% { opacity: 1; } 50% { opacity: 0.35; } }
        .live { animation: pulsedot 1.6s ease-in-out infinite; }

        .kv { display:flex; justify-content:space-between; padding:.35rem 0; border-bottom:1px solid rgba(201,162,39,.10); font-size:.8rem; }
        .kv span:first-child { color: var(--tan); }
        .kv span:last-child { color:#dcd4c2; font-weight:600; font-variant-numeric: tabular-nums; }
        .pill { font-size:.62rem; text-transform:uppercase; letter-spacing:.05em; padding:.08rem .4rem; border-radius:9999px; border:1px solid rgba(224,138,74,.4); color:#f4c79f; background:rgba(224,138,74,.08); }
        .pill-int { border-color:rgba(148,163,184,.35); color:#cbd5e1; background:rgba(148,163,184,.07); }

        /* warm the neutral slate ramp → stone/parchment (keeps status colours intact) */
        .text-white{color:var(--parchment)!important}
        .text-slate-200{color:#dad2c0!important}
        .text-slate-300{color:#c4bca9!important}
        .text-slate-400{color:#9d9482!important}
        .text-slate-500{color:#857c6b!important}
        .text-slate-600{color:#6b6353!important}
        .bg-slate-900{background-color:#0f1116!important}
        .bg-slate-800{background-color:#191c23!important}
        .bg-slate-700{background-color:#23262f!important}
        .hover\:bg-slate-600:hover{background-color:#2d313c!important}
        .hover\:bg-slate-800:hover{background-color:#191c23!important}
        .border-slate-600{border-color:rgba(201,162,39,.24)!important}
        .border-slate-700{border-color:rgba(201,162,39,.16)!important}
        .border-slate-800{border-color:rgba(201,162,39,.10)!important}
    </style>
</head>
<body class="p-6 min-h-screen flex flex-col">
    <nav class="glass sticky top-0 z-50 px-6 pt-4 pb-0 mb-6 rounded-xl shadow-lg overflow-hidden">
        <div class="flex justify-between items-center">
            <div class="flex items-center gap-4">
                <a href="./index.html" class="text-slate-400 hover:text-white transition text-sm font-semibold flex items-center gap-1" title="Back to Argus">← <span class="hidden sm:inline cinzel">ARGUS</span></a>
                <span class="medallion w-11 h-11 flex items-center justify-center text-lg font-bold leading-none select-none">K</span>
                <div>
                    <h1 class="text-2xl font-bold iris">Kafka</h1>
                    <p class="tagline text-sm text-slate-400 mt-0.5" id="hostline">reading the brokers…</p>
                </div>
            </div>
            <div class="flex items-center space-x-4">
                <div class="flex items-center gap-2">
                    <span class="w-2.5 h-2.5 rounded-full bg-slate-500" id="statusDot"></span>
                    <span class="text-sm font-bold text-slate-400" id="statusText">…</span>
                </div>
                <p class="text-sm text-slate-400" id="refreshTime"></p>
                <button onclick="load()" class="bg-slate-700 hover:bg-slate-600 text-white text-sm font-semibold py-2 px-3 rounded-lg transition shadow-md" style="border:1px solid rgba(201,162,39,.25)">Refresh ↻</button>
            </div>
        </div>
        <div class="cornice mt-4"></div>
    </nav>

    <main class="w-full flex-grow" id="content"></main>

    <script>
        const REFRESH_MS = 5000;
        let trendRange = 6;        // hours shown in the partition-health chart
        let trendData = [];        // [{ts, under_replicated, offline, partitions, brokers}]
        const RANGES = [{ h: 1, l: '1H' }, { h: 6, l: '6H' }, { h: 24, l: '1D' }, { h: 168, l: '1W' }];

        const num = (n) => (n === null || n === undefined) ? '—' : new Intl.NumberFormat('en-US').format(n);
        // counts where >0 is bad (under-replicated / offline partitions)
        const badColor = (v) => (v==null)?'text-slate-400':(v>0?'text-red-400':'text-emerald-400');
        const badBorder = (v) => (v==null)?'border-slate-600':(v>0?'border-red-500':'border-emerald-500');

        function card(title, accent, rowsHtml) {
            return `<div class="glass p-5 rounded-xl border-t-4 ${accent} shadow-md">
                <h3 class="text-xs uppercase tracking-wider font-bold text-slate-400 mb-3">${title}</h3>
                <div>${rowsHtml}</div></div>`;
        }
        const row = (k, v) => `<div class="kv"><span>${k}</span><span>${v}</span></div>`;
        function stat(label, value, valueColor, accent, sub='') {
            return `<div class="glass p-5 rounded-xl border-b-4 ${accent} shadow-md">
                <p class="text-xs uppercase text-slate-400 mb-1 font-semibold tracking-wider">${label}</p>
                <p class="text-2xl font-bold ${valueColor} leading-tight">${value}</p>
                ${sub ? `<p class="text-xs text-slate-500 mt-1">${sub}</p>` : ''}</div>`;
        }

        // ---- range-selectable partition-health trend (under-replicated + offline) ----
        async function loadTrend() {
            try { const r = await fetch('/api/kafka/history?hours=' + trendRange); trendData = await r.json(); }
            catch (e) { trendData = []; }
            drawTrend();
        }
        function setRange(h) { trendRange = h; loadTrend(); }
        window.setRange = setRange;
        function rangeButtons() {
            return RANGES.map(r => {
                const on = r.h === trendRange;
                return `<button onclick="setRange(${r.h})" class="px-3 py-1 rounded-lg text-xs font-bold transition ${on ? 'bg-orange-600 text-white shadow' : 'bg-slate-700 text-slate-300 hover:bg-slate-600'}">${r.l}</button>`;
            }).join('');
        }
        const fmtTs = (ts) => {
            const d = new Date(ts * 1000);
            return trendRange <= 24
                ? d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
                : d.toLocaleString([], { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
        };
        function _line(series, max, W, H) {
            const n = trendData.length;
            if (n < 2) return '';
            const step = W / (n - 1);
            const pts = [];
            trendData.forEach((d, i) => {
                const v = d[series];
                if (v == null) return;
                pts.push(`${(i * step).toFixed(1)},${(H - (v / max) * (H - 4) - 2).toFixed(1)}`);
            });
            return pts.join(' ');
        }
        function drawTrend() {
            const el = document.getElementById('trendChart');
            if (!el) return;
            const axisEl = document.getElementById('trendAxis');
            const uv = trendData.map(d => d.under_replicated).filter(v => v != null);
            const ov = trendData.map(d => d.offline).filter(v => v != null);
            if (uv.length + ov.length < 2) {
                el.innerHTML = '<div class="h-32 flex items-center justify-center text-slate-600 text-sm">no samples in this range yet…</div>';
                if (axisEl) axisEl.innerHTML = '';
                return;
            }
            const max = Math.max(...uv, ...ov, 1);
            const W = 600, H = 130;
            const upts = _line('under_replicated', max, W, H), opts = _line('offline', max, W, H);
            el.innerHTML = `<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" class="w-full h-32">
                <line x1="0" y1="2" x2="${W}" y2="2" stroke="#334155" stroke-width="0.5" vector-effect="non-scaling-stroke"/>
                <line x1="0" y1="${H/2}" x2="${W}" y2="${H/2}" stroke="#1e293b" stroke-width="0.5" vector-effect="non-scaling-stroke"/>
                ${upts ? `<polyline fill="none" stroke="#f59e0b" stroke-width="1.5" vector-effect="non-scaling-stroke" points="${upts}"/>` : ''}
                ${opts ? `<polyline fill="none" stroke="#ef4444" stroke-width="1.5" vector-effect="non-scaling-stroke" points="${opts}"/>` : ''}
            </svg>`;
            if (axisEl) axisEl.innerHTML = `<span>${fmtTs(trendData[0].ts)}</span><span>0–${max} · ${trendData.length} pts</span><span>${fmtTs(trendData[trendData.length - 1].ts)}</span>`;
        }

        function showSkeletons() {
            document.getElementById('content').innerHTML = `
                <div class="grid grid-cols-2 md:grid-cols-4 gap-6 mb-8">
                    ${Array(4).fill('<div class="glass p-5 rounded-xl border-b-4 border-slate-700"><div class="skel rounded mb-2" style="height:.7rem;width:60%"></div><div class="skel rounded" style="height:1.6rem;width:50%"></div></div>').join('')}
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    ${Array(2).fill('<div class="glass p-5 rounded-xl border-t-4 border-slate-700"><div class="skel rounded mb-3" style="height:.8rem;width:40%"></div>'+Array(4).fill('<div class="skel rounded mb-2" style="height:.7rem;width:90%"></div>').join('')+'</div>').join('')}
                </div>`;
        }

        function renderError(d) {
            document.getElementById('statusDot').className = 'w-2.5 h-2.5 rounded-full bg-red-500 live';
            document.getElementById('statusText').className = 'text-sm font-bold text-red-400';
            document.getElementById('statusText').innerText = 'UNREACHABLE';
            document.getElementById('hostline').innerText = d.host || '';
            document.getElementById('content').innerHTML = `
                <div class="glass p-8 rounded-xl border-l-4 border-red-500 text-center">
                    <p class="text-red-400 font-bold text-lg mb-2">Kafka is not responding</p>
                    <p class="text-slate-400 text-sm font-mono">${d.error || 'unknown error'}</p>
                </div>`;
        }

        function render(d) {
            document.getElementById('refreshTime').innerText = 'Updated ' + new Date(d.fetched).toLocaleTimeString();
            if (!d.ok) { renderError(d); return; }

            const sm = d.summary || {};
            const healthy = (sm.under_replicated === 0) && (sm.offline === 0) && d.has_controller && (sm.brokers > 0);
            document.getElementById('statusDot').className = 'w-2.5 h-2.5 rounded-full ' + (healthy ? 'bg-emerald-400' : 'bg-amber-400') + ' live';
            document.getElementById('statusText').className = 'text-sm font-bold ' + (healthy ? 'text-emerald-400' : 'text-amber-400');
            document.getElementById('statusText').innerText = healthy ? 'HEALTHY' : 'DEGRADED';
            document.getElementById('hostline').innerText =
                `${d.host} · ${num(sm.brokers)} broker(s) · ${num(sm.topics)} topics · ${num(sm.partitions)} partitions`;

            const okPartitions = (sm.partitions ?? 0) - (sm.under_replicated ?? 0) - (sm.offline ?? 0);

            // ---- top stats ----
            const stats = `<div class="grid grid-cols-2 md:grid-cols-4 gap-6 mb-8">
                ${stat('Brokers', num(sm.brokers), 'text-white', 'border-orange-500', 'cluster members')}
                ${stat('Controller', d.has_controller ? 'node ' + d.controller_id : 'NONE', d.has_controller ? 'text-emerald-400' : 'text-red-400', d.has_controller ? 'border-emerald-500' : 'border-red-500', d.has_controller ? 'active controller' : 'no elected controller')}
                ${stat('Topics', num(sm.topics), 'text-white', 'border-amber-500', `${num(sm.user_topics)} user · ${num(sm.internal_topics)} internal`)}
                ${stat('Partitions', num(sm.partitions), 'text-white', 'border-sky-500', `${num(okPartitions)} in-sync`)}
            </div>`;

            // ---- health heroes ----
            const heroes = `<div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
                ${stat('Under-replicated', num(sm.under_replicated), badColor(sm.under_replicated), badBorder(sm.under_replicated), 'ISR < replicas')}
                ${stat('Offline', num(sm.offline), badColor(sm.offline), badBorder(sm.offline), 'partitions with no leader')}
                ${stat('In-sync', num(okPartitions), 'text-emerald-400', 'border-emerald-500', 'fully-replicated partitions')}
                ${stat('Protocol APIs', num(d.api && d.api.api_count), 'text-slate-200', 'border-slate-600', `metadata v${(d.api && d.api.max_metadata_version) ?? '?'}`)}
            </div>`;

            const trend = `<div class="glass p-5 rounded-xl border-t-4 border-orange-500 shadow-md mb-8">
                <div class="flex justify-between items-center mb-3 flex-wrap gap-2">
                    <div class="flex items-center gap-4 flex-wrap">
                        <h3 class="text-xs uppercase tracking-wider font-bold text-slate-400">Partition health trend</h3>
                        <span class="flex items-center gap-1.5 text-xs text-slate-400"><span class="inline-block w-3 h-[2px]" style="background:#f59e0b"></span>under-replicated</span>
                        <span class="flex items-center gap-1.5 text-xs text-slate-400"><span class="inline-block w-3 h-[2px]" style="background:#ef4444"></span>offline</span>
                    </div>
                    <div class="flex gap-1.5">${rangeButtons()}</div>
                </div>
                <div id="trendChart"></div>
                <div class="flex justify-between text-[10px] text-slate-500 mt-1" id="trendAxis"></div>
            </div>`;

            const perfSection = `<div class="mb-2"><h2 class="text-xl font-bold text-white flex items-center"><span class="w-2 h-6 bg-orange-500 rounded-full mr-3"></span>Cluster health</h2>
                <p class="text-xs text-slate-500 mt-1 ml-5">Derived from broker metadata: under-replicated = partitions whose in-sync replica set is smaller than the assigned replica set; offline = partitions with no elected leader. Both should sit at zero.</p></div>
                <div class="mt-4">${heroes}${trend}</div>`;

            // ---- brokers table ----
            const brokerRows = (d.brokers||[]).map(b => `
                <tr class="border-b border-slate-800/50 hover:bg-slate-800/60 transition-colors">
                    <td class="py-3 px-4 font-bold text-white">${b.controller ? '<span class="text-emerald-400 mr-1.5" title="active controller">★</span>' : ''}node ${b.node_id}</td>
                    <td class="py-3 px-4 text-slate-300">${b.host}:${b.port}</td>
                    <td class="py-3 px-4 text-slate-400">${b.rack || '—'}</td>
                    <td class="py-3 px-4">${b.controller ? '<span class="pill">controller</span>' : '<span class="text-slate-600">—</span>'}</td>
                    <td class="py-3 px-4 text-right text-slate-300">${num(b.leader_partitions)}</td>
                </tr>`).join('') || '<tr><td colspan="5" class="text-center py-8 text-slate-500">No brokers.</td></tr>';
            const brokerTable = `<div class="mb-2"><h2 class="text-xl font-bold text-white flex items-center"><span class="w-2 h-6 bg-emerald-500 rounded-full mr-3"></span>Brokers</h2></div>
                <div class="glass rounded-xl shadow-xl overflow-x-auto mt-4 mb-8">
                    <table class="w-full text-left border-collapse text-sm">
                        <thead class="bg-slate-900"><tr class="text-xs uppercase tracking-wide text-slate-500 border-b border-slate-700">
                            <th class="py-4 px-4">Broker</th><th class="py-4 px-4">Endpoint</th><th class="py-4 px-4">Rack</th>
                            <th class="py-4 px-4">Role</th><th class="py-4 px-4 text-right">Leader partitions</th>
                        </tr></thead><tbody>${brokerRows}</tbody>
                    </table>
                </div>`;

            // ---- topics table (unhealthy first) ----
            const topicRows = (d.topics||[]).map(t => {
                const trouble = (t.under_replicated||0) + (t.offline||0);
                return `<tr class="border-b border-slate-800/50 hover:bg-slate-800/60 transition-colors ${trouble ? 'bg-red-500/5' : ''}">
                    <td class="py-3 px-4 font-semibold text-white">${t.name}${t.internal ? ' <span class="pill pill-int">internal</span>' : ''}</td>
                    <td class="py-3 px-4 text-right text-slate-300">${num(t.partitions)}</td>
                    <td class="py-3 px-4 text-right text-slate-300">${num(t.replication)}</td>
                    <td class="py-3 px-4 text-right ${badColor(t.under_replicated)}">${num(t.under_replicated)}</td>
                    <td class="py-3 px-4 text-right ${badColor(t.offline)}">${num(t.offline)}</td>
                </tr>`;
            }).join('') || '<tr><td colspan="5" class="text-center py-8 text-slate-500">No topics.</td></tr>';
            const topicTable = `<div class="mb-2"><h2 class="text-xl font-bold text-white flex items-center"><span class="w-2 h-6 bg-amber-500 rounded-full mr-3"></span>Topics</h2>
                <p class="text-xs text-slate-500 mt-1 ml-5">${(d.topics||[]).length} topics · troubled topics first</p></div>
                <div class="glass rounded-xl shadow-xl overflow-x-auto mt-4">
                    <table class="w-full text-left border-collapse text-sm">
                        <thead class="bg-slate-900"><tr class="text-xs uppercase tracking-wide text-slate-500 border-b border-slate-700">
                            <th class="py-4 px-4">Topic</th><th class="py-4 px-4 text-right">Partitions</th><th class="py-4 px-4 text-right">Replication</th>
                            <th class="py-4 px-4 text-right">Under-replicated</th><th class="py-4 px-4 text-right">Offline</th>
                        </tr></thead><tbody>${topicRows}</tbody>
                    </table>
                </div>`;

            document.getElementById('content').innerHTML = stats + perfSection + brokerTable + topicTable;
            drawTrend();
        }

        async function load() {
            try {
                const res = await fetch('/api/kafka');
                render(await res.json());
            } catch (err) {
                renderError({ error: String(err) });
            }
        }

        showSkeletons();
        loadTrend().then(load);
        setInterval(load, REFRESH_MS);
        setInterval(loadTrend, 60000);
    </script>
</body>
</html>
