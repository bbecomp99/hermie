<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Argus · Ollama</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&display=swap" rel="stylesheet">
    <style>
        /* ── Argus theme: Obsidian & Bronze (a temple at night) ── */
        :root {
            --obsidian:#0b0d11; --stone:#15171d; --stone2:#1b1e26;
            --bronze:#c9a227; --bronze-hi:#e7c869; --aegean:#2a9d8f;
            --violet:#8b7ff0; --parchment:#ece6d6; --tan:#9d9482;
        }
        body {
            background:
                radial-gradient(1100px 560px at 50% -12%, rgba(201,162,39,.07), transparent 60%),
                radial-gradient(900px 520px at 100% 0%, rgba(139,127,240,.06), transparent 55%),
                var(--obsidian);
            color: var(--parchment);
            font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }
        h1, h2, .cinzel { font-family: 'Cinzel', Georgia, 'Times New Roman', serif; letter-spacing: .045em; }
        .tagline { font-family: 'Cormorant Garamond', Georgia, serif; font-style: italic; letter-spacing: .02em; }

        .glass {
            background:
                linear-gradient(180deg, rgba(255,255,255,.025), rgba(0,0,0,.12)),
                linear-gradient(145deg, var(--stone2), var(--stone));
            border: 1px solid rgba(201,162,39,.18);
            box-shadow: inset 0 1px 0 rgba(255,255,255,.045), 0 10px 28px rgba(0,0,0,.38);
        }
        .iris { background: linear-gradient(92deg, #b3a9ff, var(--violet) 60%, #6b5fd6);
                -webkit-background-clip: text; background-clip: text; color: transparent; }

        .cornice {
            height: 12px; opacity: .85;
            background:
                linear-gradient(var(--bronze),var(--bronze)) left top/100% 1.5px no-repeat,
                linear-gradient(var(--bronze),var(--bronze)) left bottom/100% 1.5px no-repeat,
                repeating-linear-gradient(90deg, var(--bronze) 0 5px, transparent 5px 11px) center/100% 5px no-repeat;
        }
        .medallion { border: 1.5px solid rgba(201,162,39,.55); border-radius: 9999px;
                     box-shadow: inset 0 0 12px rgba(201,162,39,.18), 0 0 0 4px rgba(201,162,39,.06); }

        ::-webkit-scrollbar { width: 9px; height: 9px; }
        ::-webkit-scrollbar-track { background: rgba(0,0,0,.25); }
        ::-webkit-scrollbar-thumb { background: linear-gradient(var(--bronze),#8a6d1a); border-radius: 6px; }

        @keyframes shimmer { 0% { background-position: -800px 0; } 100% { background-position: 800px 0; } }
        .skel { background: linear-gradient(90deg, #1b1e26 25%, #2a2c1f 50%, #1b1e26 75%); background-size: 800px 100%; animation: shimmer 1.4s ease-in-out infinite; display: inline-block; }
        @keyframes pulsedot { 0%,100% { opacity: 1; } 50% { opacity: 0.35; } }
        .live { animation: pulsedot 1.6s ease-in-out infinite; }

        .kv { display:flex; justify-content:space-between; padding:.35rem 0; border-bottom:1px solid rgba(201,162,39,.10); font-size:.8rem; }
        .kv span:first-child { color: var(--tan); }
        .kv span:last-child { color:#dcd4c2; font-weight:600; font-variant-numeric: tabular-nums; }
        .cap { font-size:.62rem; text-transform:uppercase; letter-spacing:.05em; padding:.08rem .4rem; border-radius:9999px; border:1px solid rgba(139,127,240,.4); color:#c3bbff; background:rgba(139,127,240,.08); }

        /* warm the neutral slate ramp → stone/parchment (keeps status colours intact) */
        .text-white{color:var(--parchment)!important}
        .text-slate-200{color:#dad2c0!important}
        .text-slate-300{color:#c4bca9!important}
        .text-slate-400{color:#9d9482!important}
        .text-slate-500{color:#857c6b!important}
        .text-slate-600{color:#6b6353!important}
        .bg-slate-900{background-color:#0f1116!important}
        .bg-slate-800{background-color:#191c23!important}
        .bg-slate-700{background-color:#23262f!important}
        .hover\:bg-slate-600:hover{background-color:#2d313c!important}
        .hover\:bg-slate-800:hover{background-color:#191c23!important}
        .border-slate-600{border-color:rgba(201,162,39,.24)!important}
        .border-slate-700{border-color:rgba(201,162,39,.16)!important}
        .border-slate-800{border-color:rgba(201,162,39,.10)!important}
    </style>
</head>
<body class="p-6 min-h-screen flex flex-col">
    <nav class="glass sticky top-0 z-50 px-6 pt-4 pb-0 mb-6 rounded-xl shadow-lg overflow-hidden">
        <div class="flex justify-between items-center">
            <div class="flex items-center gap-4">
                <a href="./index.html" class="text-slate-400 hover:text-white transition text-sm font-semibold flex items-center gap-1" title="Back to Argus">← <span class="hidden sm:inline cinzel">ARGUS</span></a>
                <span class="medallion w-11 h-11 flex items-center justify-center text-xl leading-none select-none">🦙</span>
                <div>
                    <h1 class="text-2xl font-bold iris">Ollama</h1>
                    <p class="tagline text-sm text-slate-400 mt-0.5" id="hostline">consulting the oracle…</p>
                </div>
            </div>
            <div class="flex items-center space-x-4">
                <div class="flex items-center gap-2">
                    <span class="w-2.5 h-2.5 rounded-full bg-slate-500" id="statusDot"></span>
                    <span class="text-sm font-bold text-slate-400" id="statusText">…</span>
                </div>
                <p class="text-sm text-slate-400" id="refreshTime"></p>
                <button onclick="load()" class="bg-slate-700 hover:bg-slate-600 text-white text-sm font-semibold py-2 px-3 rounded-lg transition shadow-md" style="border:1px solid rgba(201,162,39,.25)">Refresh ↻</button>
            </div>
        </div>
        <div class="cornice mt-4"></div>
    </nav>

    <main class="w-full flex-grow" id="content"></main>

    <script>
        const REFRESH_MS = 5000;
        let trendRange = 24;      // hours shown in the throughput chart
        let trendData = [];       // [{ts, eval_tps, prompt_tps, load_ms}] from history
        const RANGES = [{ h: 1, l: '1H' }, { h: 24, l: '1D' }, { h: 168, l: '1W' }, { h: 720, l: '1M' }];

        // ---- formatting helpers (shared style with the Mongo page) ----
        const num = (n) => (n === null || n === undefined) ? '—' : new Intl.NumberFormat('en-US').format(n);
        const bytes = (n) => {
            if (n === null || n === undefined) return '—';
            const u = ['B','KB','MB','GB','TB','PB']; let i = 0; n = Number(n);
            while (n >= 1024 && i < u.length - 1) { n /= 1024; i++; }
            return n.toFixed(n < 10 && i > 0 ? 2 : 0) + ' ' + u[i];
        };
        const dur = (s) => {
            if (s === null || s === undefined) return '—';
            s = Math.floor(s); const d = Math.floor(s/86400); s -= d*86400;
            const h = Math.floor(s/3600); s -= h*3600; const m = Math.floor(s/60);
            return (d ? d+'d ' : '') + (h || d ? h+'h ' : '') + m + 'm';
        };
        // Ollama timestamps carry 9-digit fractional seconds — trim to 3 so Date() parses.
        const parseTs = (s) => { if (!s) return null; const d = new Date(s.replace(/(\.\d{3})\d+/, '$1')); return isNaN(d) ? null : d; };
        const fmtMod = (s) => { const d = parseTs(s); return d ? d.toLocaleDateString([], { month:'short', day:'numeric', year:'2-digit' }) : '—'; };

        function card(title, accent, rowsHtml) {
            return `<div class="glass p-5 rounded-xl border-t-4 ${accent} shadow-md">
                <h3 class="text-xs uppercase tracking-wider font-bold text-slate-400 mb-3">${title}</h3>
                <div>${rowsHtml}</div></div>`;
        }
        const row = (k, v, extra='') => `<div class="kv"><span>${k}</span><span>${v}${extra}</span></div>`;
        function stat(label, value, accent, sub='') {
            return `<div class="glass p-5 rounded-xl border-b-4 ${accent} shadow-md">
                <p class="text-xs uppercase text-slate-400 mb-1 font-semibold tracking-wider">${label}</p>
                <p class="text-2xl font-bold text-white leading-tight">${value}</p>
                ${sub ? `<p class="text-xs text-slate-500 mt-1">${sub}</p>` : ''}</div>`;
        }
        function perfHero(label, value, valueColor, accent, sub) {
            return `<div class="glass p-5 rounded-xl border-b-4 ${accent} shadow-md">
                <p class="text-xs uppercase text-slate-400 mb-1 font-semibold tracking-wider">${label}</p>
                <p class="text-2xl font-bold ${valueColor} leading-tight">${value}</p>
                <p class="text-xs text-slate-500 mt-1">${sub}</p></div>`;
        }
        // tok/s → colour (higher is better): green ≥ g, amber ≥ a, else red
        const tpsColor = (v, g, a) => v == null ? 'text-slate-400' : v >= g ? 'text-emerald-400' : v >= a ? 'text-amber-400' : 'text-red-400';
        const tpsBorder = (v, g, a) => v == null ? 'border-slate-600' : v >= g ? 'border-emerald-500' : v >= a ? 'border-amber-500' : 'border-red-500';

        // ---- range-selectable throughput trend (eval + prompt tok/s, from history) ----
        async function loadTrend() {
            try { const r = await fetch('/api/ollama/history?hours=' + trendRange); trendData = await r.json(); }
            catch (e) { trendData = []; }
            drawTrend();
        }
        function setRange(h) { trendRange = h; loadTrend(); }
        window.setRange = setRange;
        function rangeButtons() {
            return RANGES.map(r => {
                const on = r.h === trendRange;
                return `<button onclick="setRange(${r.h})" class="px-3 py-1 rounded-lg text-xs font-bold transition ${on ? 'bg-indigo-600 text-white shadow' : 'bg-slate-700 text-slate-300 hover:bg-slate-600'}">${r.l}</button>`;
            }).join('');
        }
        const fmtTs = (ts) => {
            const d = new Date(ts * 1000);
            return trendRange <= 24
                ? d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
                : d.toLocaleString([], { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
        };
        function _line(series, max, W, H) {
            const n = trendData.length;
            if (n < 2) return '';
            const step = W / (n - 1);
            const pts = [];
            trendData.forEach((d, i) => {
                const v = d[series];
                if (v == null) return;
                pts.push(`${(i * step).toFixed(1)},${(H - (v / max) * (H - 4) - 2).toFixed(1)}`);
            });
            return pts.join(' ');
        }
        function drawTrend() {
            const el = document.getElementById('trendChart');
            if (!el) return;
            const peakEl = document.getElementById('trendPeak');
            const axisEl = document.getElementById('trendAxis');
            const ev = trendData.map(d => d.eval_tps).filter(v => v != null);
            const pv = trendData.map(d => d.prompt_tps).filter(v => v != null);
            if (ev.length + pv.length < 2) {
                el.innerHTML = '<div class="h-32 flex items-center justify-center text-slate-600 text-sm">no canary samples in this range yet…</div>';
                if (peakEl) peakEl.innerText = '';
                if (axisEl) axisEl.innerHTML = '';
                return;
            }
            const max = Math.max(...ev, ...pv, 1);
            const W = 600, H = 130;
            const epts = _line('eval_tps', max, W, H), ppts = _line('prompt_tps', max, W, H);
            el.innerHTML = `<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" class="w-full h-32">
                <line x1="0" y1="2" x2="${W}" y2="2" stroke="#334155" stroke-width="0.5" vector-effect="non-scaling-stroke"/>
                <line x1="0" y1="${H/2}" x2="${W}" y2="${H/2}" stroke="#1e293b" stroke-width="0.5" vector-effect="non-scaling-stroke"/>
                ${ppts ? `<polyline fill="none" stroke="#a78bfa" stroke-width="1.5" vector-effect="non-scaling-stroke" points="${ppts}"/>` : ''}
                ${epts ? `<polyline fill="none" stroke="#34d399" stroke-width="1.5" vector-effect="non-scaling-stroke" points="${epts}"/>` : ''}
            </svg>`;
            if (peakEl) peakEl.innerText = `0–${max.toFixed(0)} tok/s · ${trendData.length} pts`;
            if (axisEl) axisEl.innerHTML = `<span>${fmtTs(trendData[0].ts)}</span><span>${fmtTs(trendData[trendData.length - 1].ts)}</span>`;
        }

        function showSkeletons() {
            document.getElementById('content').innerHTML = `
                <div class="grid grid-cols-2 md:grid-cols-4 gap-6 mb-8">
                    ${Array(4).fill('<div class="glass p-5 rounded-xl border-b-4 border-slate-700"><div class="skel rounded mb-2" style="height:.7rem;width:60%"></div><div class="skel rounded" style="height:1.6rem;width:50%"></div></div>').join('')}
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4">
                    ${Array(3).fill('<div class="glass p-5 rounded-xl border-t-4 border-slate-700"><div class="skel rounded mb-3" style="height:.8rem;width:40%"></div>'+Array(4).fill('<div class="skel rounded mb-2" style="height:.7rem;width:90%"></div>').join('')+'</div>').join('')}
                </div>`;
        }

        function renderError(d) {
            document.getElementById('statusDot').className = 'w-2.5 h-2.5 rounded-full bg-red-500 live';
            document.getElementById('statusText').className = 'text-sm font-bold text-red-400';
            document.getElementById('statusText').innerText = 'UNREACHABLE';
            document.getElementById('hostline').innerText = d.host || '';
            document.getElementById('content').innerHTML = `
                <div class="glass p-8 rounded-xl border-l-4 border-red-500 text-center">
                    <p class="text-red-400 font-bold text-lg mb-2">Ollama is not responding</p>
                    <p class="text-slate-400 text-sm font-mono">${d.error || 'unknown error'}</p>
                </div>`;
        }

        function render(d) {
            document.getElementById('refreshTime').innerText = 'Updated ' + new Date(d.fetched).toLocaleTimeString();
            if (!d.ok) { renderError(d); return; }

            document.getElementById('statusDot').className = 'w-2.5 h-2.5 rounded-full bg-emerald-400 live';
            document.getElementById('statusText').className = 'text-sm font-bold text-emerald-400';
            document.getElementById('statusText').innerText = 'ONLINE';

            const cny = d.canary || null;
            const show = d.show || null;
            const caps = (show && show.capabilities) || [];
            const det = (show && show.details) || {};
            const mi = (show && show.model_info) || {};
            const pick = (suffix) => { const k = Object.keys(mi).find(x => x.endsWith(suffix)); return k != null ? mi[k] : null; };
            const ctx = pick('.context_length');
            document.getElementById('hostline').innerText =
                `${d.host} · Cloud · Ollama ${d.version || '?'} · ${(d.models||[]).length} models available`;

            // ---- top stats (cloud is serverless — no resident model / VRAM) ----
            const stats = `<div class="grid grid-cols-2 md:grid-cols-4 gap-6 mb-8">
                ${stat('Endpoint', 'Cloud', 'border-indigo-500', d.host || 'ollama.com')}
                ${stat('Active model', d.focus || '—', 'border-emerald-500', det.parameter_size ? det.parameter_size + (det.quantization_level ? ' · ' + det.quantization_level : '') : 'configured for the agent')}
                ${stat('Capabilities', caps.length ? caps.join(' · ') : '—', 'border-violet-500', 'model features')}
                ${stat('Context window', ctx != null ? num(ctx) : '—', 'border-sky-500', 'tokens')}
            </div>`;

            // ---- Throughput (canary) — cloud reports end-to-end timing only ----
            const evalTps = cny ? cny.eval_tps : null;
            const promptTps = cny ? cny.prompt_tps : null;
            const totalMs = cny ? cny.total_ms : null;
            const heroes = `<div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-4">
                ${perfHero('Round-trip throughput', evalTps == null ? '—' : evalTps.toFixed(1) + ' tok/s', tpsColor(evalTps, 60, 30), tpsBorder(evalTps, 60, 30), cny ? 'end-to-end generation' : 'awaiting first canary…')}
                ${perfHero('Prompt throughput', promptTps == null ? '—' : promptTps.toFixed(1) + ' tok/s', tpsColor(promptTps, 100, 40), tpsBorder(promptTps, 100, 40), cny ? 'prefill speed' : 'cloud may omit')}
                ${perfHero('Round-trip time', totalMs == null ? '—' : (totalMs >= 1000 ? (totalMs/1000).toFixed(1)+' s' : totalMs.toFixed(0)+' ms'), totalMs == null ? 'text-slate-400' : totalMs < 1500 ? 'text-emerald-400' : totalMs < 5000 ? 'text-amber-400' : 'text-red-400', totalMs == null ? 'border-slate-600' : totalMs < 1500 ? 'border-emerald-500' : totalMs < 5000 ? 'border-amber-500' : 'border-red-500', 'per canary call')}
                ${perfHero('Last canary', cny && cny.fetched ? new Date(cny.fetched).toLocaleTimeString() : '—', 'text-slate-200', 'border-indigo-500', cny ? `${num(cny.eval_count)} tok generated` : 'every 15 min')}
            </div>`;

            const trend = `<div class="glass p-5 rounded-xl border-t-4 border-indigo-500 shadow-md mb-8">
                <div class="flex justify-between items-center mb-3 flex-wrap gap-2">
                    <div class="flex items-center gap-4 flex-wrap">
                        <h3 class="text-xs uppercase tracking-wider font-bold text-slate-400">Throughput trend</h3>
                        <span class="flex items-center gap-1.5 text-xs text-slate-400"><span class="inline-block w-3 h-[2px] bg-emerald-400"></span>eval</span>
                        <span class="flex items-center gap-1.5 text-xs text-slate-400"><span class="inline-block w-3 h-[2px]" style="background:#a78bfa"></span>prompt</span>
                        <span class="text-xs text-slate-500" id="trendPeak"></span>
                    </div>
                    <div class="flex gap-1.5">${rangeButtons()}</div>
                </div>
                <div id="trendChart"></div>
                <div class="flex justify-between text-[10px] text-slate-500 mt-1" id="trendAxis"></div>
            </div>`;

            const perfSection = `<div class="mb-2"><h2 class="text-xl font-bold text-white flex items-center"><span class="w-2 h-6 bg-indigo-500 rounded-full mr-3"></span>Throughput</h2>
                <p class="text-xs text-slate-500 mt-1 ml-5">Ollama has no passive metrics endpoint — these come from a tiny periodic "canary" generation (a real billed cloud call). Cloud reports only end-to-end timing, so this is round-trip throughput (includes queue + network), not pure decode speed.</p></div>
                <div class="mt-4">${heroes}${trend}</div>`;

            // ---- detail cards ----
            const cards = [];

            cards.push(card('Active model', d.focus ? 'border-emerald-500' : 'border-slate-600',
                d.focus ? (
                    row('Name', d.focus) +
                    row('Family', det.family || '—') +
                    row('Parameters', det.parameter_size || '—') +
                    row('Quantization', det.quantization_level || '—') +
                    row('Context window', ctx != null ? num(ctx) : '—') +
                    row('Capabilities', caps.length ? caps.join(', ') : '—')
                ) : '<p class="text-sm text-slate-500 py-4">No model configured.</p>'
            ));

            if (show && Object.keys(show.parameters||{}).length) {
                const p = show.parameters;
                cards.push(card('Active config (sampling)', 'border-violet-500',
                    Object.keys(p).map(k => row(k, p[k])).join('')
                ));
            }

            if (show && Object.keys(show.model_info||{}).length) {
                // surface the most useful architecture facts first (mi/pick from above)
                const archRows =
                    row('Architecture', pick('.architecture') || '—') +
                    row('Parameters', (pick('.parameter_count') != null ? num(pick('.parameter_count')) : '—')) +
                    row('Quant version', pick('.quantization_version') != null ? num(pick('.quantization_version')) : '—') +
                    row('Block count', pick('.block_count') != null ? num(pick('.block_count')) : '—') +
                    row('Context length', pick('.context_length') != null ? num(pick('.context_length')) : '—') +
                    row('Embedding length', pick('.embedding_length') != null ? num(pick('.embedding_length')) : '—') +
                    row('Attn heads', pick('.attention.head_count') != null ? num(pick('.attention.head_count')) : '—') +
                    row('KV heads', pick('.attention.head_count_kv') != null ? num(pick('.attention.head_count_kv')) : '—') +
                    (pick('.expert_count') != null ? row('Experts (used/total)', `${num(pick('.expert_used_count'))} / ${num(pick('.expert_count'))}`) : '') +
                    row('Vocab size', pick('.vocab_size') != null ? num(pick('.vocab_size')) : '—');
                cards.push(card('Architecture', 'border-sky-500', archRows));
            }

            const cardsHtml = `<div class="mb-2"><h2 class="text-xl font-bold text-white flex items-center"><span class="w-2 h-6 bg-violet-500 rounded-full mr-3"></span>Model detail</h2>
                <p class="text-xs text-slate-500 mt-1 ml-5">${show ? 'config & architecture for the active model' : 'model config unavailable'}</p></div>
                <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4 mt-4 mb-8">${cards.join('')}</div>`;

            // ---- cloud model catalog ----
            const mdRows = (d.models||[]).map(m => {
                const on = m.name === d.focus;
                const capsHtml = (m.capabilities||[]).map(c => `<span class="cap">${c}</span>`).join(' ');
                return `<tr class="border-b border-slate-800/50 hover:bg-slate-800/60 transition-colors">
                    <td class="py-3 px-4 font-bold text-white">${on ? '<span class="text-emerald-400 mr-1.5" title="active model">●</span>' : ''}${m.name}</td>
                    <td class="py-3 px-4 text-right text-slate-300">${m.parameter_size || '—'}</td>
                    <td class="py-3 px-4 text-right text-violet-300">${m.quantization_level || '—'}</td>
                    <td class="py-3 px-4 text-right text-emerald-300">${bytes(m.size)}</td>
                    <td class="py-3 px-4">${capsHtml || '<span class="text-slate-600">—</span>'}</td>
                    <td class="py-3 px-4 text-right text-slate-400">${fmtMod(m.modified_at)}</td>
                </tr>`;
            }).join('') || '<tr><td colspan="6" class="text-center py-8 text-slate-500">No models available.</td></tr>';
            const mdTable = `<div class="mb-2"><h2 class="text-xl font-bold text-white flex items-center"><span class="w-2 h-6 bg-emerald-500 rounded-full mr-3"></span>Cloud models</h2></div>
                <div class="glass rounded-xl shadow-xl overflow-x-auto mt-4">
                    <table class="w-full text-left border-collapse">
                        <thead class="bg-slate-900"><tr class="text-xs uppercase tracking-wide text-slate-500 border-b border-slate-700">
                            <th class="py-4 px-4">Model</th><th class="py-4 px-4 text-right">Params</th><th class="py-4 px-4 text-right">Quant</th>
                            <th class="py-4 px-4 text-right">Size</th><th class="py-4 px-4">Capabilities</th><th class="py-4 px-4 text-right">Modified</th>
                        </tr></thead>
                        <tbody>${mdRows}</tbody>
                    </table>
                </div>`;

            document.getElementById('content').innerHTML = stats + perfSection + cardsHtml + mdTable;
            drawTrend();   // (re)paint the throughput chart from cached history
        }

        async function load() {
            try {
                const res = await fetch('/api/ollama');
                render(await res.json());
            } catch (err) {
                renderError({ error: String(err) });
            }
        }

        showSkeletons();
        loadTrend().then(load);              // history chart first, then live page
        setInterval(load, REFRESH_MS);       // live state every 5s
        setInterval(loadTrend, 60000);       // throughput history refresh
    </script>
</body>
</html>
