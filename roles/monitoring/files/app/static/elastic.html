<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Argus · Elasticsearch</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&display=swap" rel="stylesheet">
    <style>
        /* ── Argus theme: Obsidian & Bronze (a temple at night) ── */
        :root {
            --obsidian:#0b0d11; --stone:#15171d; --stone2:#1b1e26;
            --bronze:#c9a227; --bronze-hi:#e7c869; --aegean:#2a9d8f;
            --teal:#2dd4bf; --parchment:#ece6d6; --tan:#9d9482;
        }
        body {
            background:
                radial-gradient(1100px 560px at 50% -12%, rgba(201,162,39,.07), transparent 60%),
                radial-gradient(900px 520px at 100% 0%, rgba(45,212,191,.06), transparent 55%),
                var(--obsidian);
            color: var(--parchment);
            font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }
        h1, h2, .cinzel { font-family: 'Cinzel', Georgia, 'Times New Roman', serif; letter-spacing: .045em; }
        .tagline { font-family: 'Cormorant Garamond', Georgia, serif; font-style: italic; letter-spacing: .02em; }

        .glass {
            background:
                linear-gradient(180deg, rgba(255,255,255,.025), rgba(0,0,0,.12)),
                linear-gradient(145deg, var(--stone2), var(--stone));
            border: 1px solid rgba(201,162,39,.18);
            box-shadow: inset 0 1px 0 rgba(255,255,255,.045), 0 10px 28px rgba(0,0,0,.38);
        }
        .iris { background: linear-gradient(92deg, #5eead4, var(--teal) 60%, #14b8a6);
                -webkit-background-clip: text; background-clip: text; color: transparent; }

        .cornice {
            height: 12px; opacity: .85;
            background:
                linear-gradient(var(--bronze),var(--bronze)) left top/100% 1.5px no-repeat,
                linear-gradient(var(--bronze),var(--bronze)) left bottom/100% 1.5px no-repeat,
                repeating-linear-gradient(90deg, var(--bronze) 0 5px, transparent 5px 11px) center/100% 5px no-repeat;
        }
        .medallion { border: 1.5px solid rgba(201,162,39,.55); border-radius: 9999px;
                     box-shadow: inset 0 0 12px rgba(201,162,39,.18), 0 0 0 4px rgba(201,162,39,.06); }

        ::-webkit-scrollbar { width: 9px; height: 9px; }
        ::-webkit-scrollbar-track { background: rgba(0,0,0,.25); }
        ::-webkit-scrollbar-thumb { background: linear-gradient(var(--bronze),#8a6d1a); border-radius: 6px; }

        @keyframes shimmer { 0% { background-position: -800px 0; } 100% { background-position: 800px 0; } }
        .skel { background: linear-gradient(90deg, #1b1e26 25%, #2a2c1f 50%, #1b1e26 75%); background-size: 800px 100%; animation: shimmer 1.4s ease-in-out infinite; display: inline-block; }
        @keyframes pulsedot { 0%,100% { opacity: 1; } 50% { opacity: 0.35; } }
        .live { animation: pulsedot 1.6s ease-in-out infinite; }

        .kv { display:flex; justify-content:space-between; padding:.35rem 0; border-bottom:1px solid rgba(201,162,39,.10); font-size:.8rem; }
        .kv span:first-child { color: var(--tan); }
        .kv span:last-child { color:#dcd4c2; font-weight:600; font-variant-numeric: tabular-nums; }
        .pill { font-size:.62rem; text-transform:uppercase; letter-spacing:.05em; padding:.08rem .4rem; border-radius:9999px; border:1px solid rgba(45,212,191,.4); color:#99f6e4; background:rgba(45,212,191,.08); }

        /* warm the neutral slate ramp → stone/parchment (keeps status colours intact) */
        .text-white{color:var(--parchment)!important}
        .text-slate-200{color:#dad2c0!important}
        .text-slate-300{color:#c4bca9!important}
        .text-slate-400{color:#9d9482!important}
        .text-slate-500{color:#857c6b!important}
        .text-slate-600{color:#6b6353!important}
        .bg-slate-900{background-color:#0f1116!important}
        .bg-slate-800{background-color:#191c23!important}
        .bg-slate-700{background-color:#23262f!important}
        .hover\:bg-slate-600:hover{background-color:#2d313c!important}
        .hover\:bg-slate-800:hover{background-color:#191c23!important}
        .border-slate-600{border-color:rgba(201,162,39,.24)!important}
        .border-slate-700{border-color:rgba(201,162,39,.16)!important}
        .border-slate-800{border-color:rgba(201,162,39,.10)!important}
    </style>
</head>
<body class="p-6 min-h-screen flex flex-col">
    <nav class="glass sticky top-0 z-50 px-6 pt-4 pb-0 mb-6 rounded-xl shadow-lg overflow-hidden">
        <div class="flex justify-between items-center">
            <div class="flex items-center gap-4">
                <a href="./index.html" class="text-slate-400 hover:text-white transition text-sm font-semibold flex items-center gap-1" title="Back to Argus">← <span class="hidden sm:inline cinzel">ARGUS</span></a>
                <span class="medallion w-11 h-11 flex items-center justify-center text-xl leading-none select-none">🔎</span>
                <div>
                    <h1 class="text-2xl font-bold iris">Elasticsearch</h1>
                    <p class="tagline text-sm text-slate-400 mt-0.5" id="hostline">consulting the index…</p>
                </div>
            </div>
            <div class="flex items-center space-x-4">
                <div class="flex items-center gap-2">
                    <span class="w-2.5 h-2.5 rounded-full bg-slate-500" id="statusDot"></span>
                    <span class="text-sm font-bold text-slate-400" id="statusText">…</span>
                </div>
                <p class="text-sm text-slate-400" id="refreshTime"></p>
                <button onclick="load()" class="bg-slate-700 hover:bg-slate-600 text-white text-sm font-semibold py-2 px-3 rounded-lg transition shadow-md" style="border:1px solid rgba(201,162,39,.25)">Refresh ↻</button>
            </div>
        </div>
        <div class="cornice mt-4"></div>
    </nav>

    <main class="w-full flex-grow" id="content"></main>

    <script>
        const REFRESH_MS = 5000;
        let trendRange = 6;        // hours shown in the saturation chart
        let trendData = [];        // [{ts, heap_pct, cpu_pct, ...}] from history
        const RANGES = [{ h: 1, l: '1H' }, { h: 6, l: '6H' }, { h: 24, l: '1D' }, { h: 168, l: '1W' }];

        const num = (n) => (n === null || n === undefined) ? '—' : new Intl.NumberFormat('en-US').format(n);
        const bytes = (n) => {
            if (n === null || n === undefined) return '—';
            const u = ['B','KB','MB','GB','TB','PB']; let i = 0; n = Number(n);
            while (n >= 1024 && i < u.length - 1) { n /= 1024; i++; }
            return n.toFixed(n < 10 && i > 0 ? 2 : 0) + ' ' + u[i];
        };
        const pct = (v) => (v === null || v === undefined) ? '—' : (+v).toFixed(0) + '%';
        const dur = (ms) => {
            if (ms === null || ms === undefined) return '—';
            let s = Math.floor(ms/1000); const d = Math.floor(s/86400); s -= d*86400;
            const h = Math.floor(s/3600); s -= h*3600; const m = Math.floor(s/60);
            return (d ? d+'d ' : '') + (h || d ? h+'h ' : '') + m + 'm';
        };

        // green/yellow/red cluster status → theme colours
        const stColor = (s) => s==='green'?'text-emerald-400':s==='yellow'?'text-amber-400':s==='red'?'text-red-400':'text-slate-400';
        const stBorder = (s) => s==='green'?'border-emerald-500':s==='yellow'?'border-amber-500':s==='red'?'border-red-500':'border-slate-600';
        const stDot = (s) => s==='green'?'bg-emerald-400':s==='yellow'?'bg-amber-400':s==='red'?'bg-red-500':'bg-slate-500';
        // higher-is-worse saturation colour (heap/cpu %)
        const satColor = (v,a,r) => v==null?'text-slate-400':v>=r?'text-red-400':v>=a?'text-amber-400':'text-emerald-400';
        const satBorder = (v,a,r) => v==null?'border-slate-600':v>=r?'border-red-500':v>=a?'border-amber-500':'border-emerald-500';
        // counts where >0 is bad (unassigned, rejections, offline)
        const badColor = (v) => (v==null)?'text-slate-400':(v>0?'text-red-400':'text-emerald-400');
        const badBorder = (v) => (v==null)?'border-slate-600':(v>0?'border-red-500':'border-emerald-500');

        function card(title, accent, rowsHtml) {
            return `<div class="glass p-5 rounded-xl border-t-4 ${accent} shadow-md">
                <h3 class="text-xs uppercase tracking-wider font-bold text-slate-400 mb-3">${title}</h3>
                <div>${rowsHtml}</div></div>`;
        }
        const row = (k, v, extra='') => `<div class="kv"><span>${k}</span><span>${v}${extra}</span></div>`;
        function stat(label, value, valueColor, accent, sub='') {
            return `<div class="glass p-5 rounded-xl border-b-4 ${accent} shadow-md">
                <p class="text-xs uppercase text-slate-400 mb-1 font-semibold tracking-wider">${label}</p>
                <p class="text-2xl font-bold ${valueColor} leading-tight">${value}</p>
                ${sub ? `<p class="text-xs text-slate-500 mt-1">${sub}</p>` : ''}</div>`;
        }

        // ---- range-selectable saturation trend (heap% + cpu%, fixed 0–100 axis) ----
        async function loadTrend() {
            try { const r = await fetch('/api/elastic/history?hours=' + trendRange); trendData = await r.json(); }
            catch (e) { trendData = []; }
            drawTrend();
        }
        function setRange(h) { trendRange = h; loadTrend(); }
        window.setRange = setRange;
        function rangeButtons() {
            return RANGES.map(r => {
                const on = r.h === trendRange;
                return `<button onclick="setRange(${r.h})" class="px-3 py-1 rounded-lg text-xs font-bold transition ${on ? 'bg-teal-600 text-white shadow' : 'bg-slate-700 text-slate-300 hover:bg-slate-600'}">${r.l}</button>`;
            }).join('');
        }
        const fmtTs = (ts) => {
            const d = new Date(ts * 1000);
            return trendRange <= 24
                ? d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
                : d.toLocaleString([], { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
        };
        function _line(series, W, H) {
            const n = trendData.length;
            if (n < 2) return '';
            const step = W / (n - 1);
            const pts = [];
            trendData.forEach((d, i) => {
                const v = d[series];
                if (v == null) return;
                pts.push(`${(i * step).toFixed(1)},${(H - (v / 100) * (H - 4) - 2).toFixed(1)}`);
            });
            return pts.join(' ');
        }
        function drawTrend() {
            const el = document.getElementById('trendChart');
            if (!el) return;
            const axisEl = document.getElementById('trendAxis');
            const hv = trendData.map(d => d.heap_pct).filter(v => v != null);
            const cv = trendData.map(d => d.cpu_pct).filter(v => v != null);
            if (hv.length + cv.length < 2) {
                el.innerHTML = '<div class="h-32 flex items-center justify-center text-slate-600 text-sm">no samples in this range yet…</div>';
                if (axisEl) axisEl.innerHTML = '';
                return;
            }
            const W = 600, H = 130;
            const hpts = _line('heap_pct', W, H), cpts = _line('cpu_pct', W, H);
            el.innerHTML = `<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" class="w-full h-32">
                <line x1="0" y1="2" x2="${W}" y2="2" stroke="#334155" stroke-width="0.5" vector-effect="non-scaling-stroke"/>
                <line x1="0" y1="${H/2}" x2="${W}" y2="${H/2}" stroke="#1e293b" stroke-width="0.5" vector-effect="non-scaling-stroke"/>
                ${cpts ? `<polyline fill="none" stroke="#a78bfa" stroke-width="1.5" vector-effect="non-scaling-stroke" points="${cpts}"/>` : ''}
                ${hpts ? `<polyline fill="none" stroke="#2dd4bf" stroke-width="1.5" vector-effect="non-scaling-stroke" points="${hpts}"/>` : ''}
            </svg>`;
            if (axisEl) axisEl.innerHTML = `<span>${fmtTs(trendData[0].ts)}</span><span>0–100% · ${trendData.length} pts</span><span>${fmtTs(trendData[trendData.length - 1].ts)}</span>`;
        }

        function showSkeletons() {
            document.getElementById('content').innerHTML = `
                <div class="grid grid-cols-2 md:grid-cols-4 gap-6 mb-8">
                    ${Array(4).fill('<div class="glass p-5 rounded-xl border-b-4 border-slate-700"><div class="skel rounded mb-2" style="height:.7rem;width:60%"></div><div class="skel rounded" style="height:1.6rem;width:50%"></div></div>').join('')}
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4">
                    ${Array(3).fill('<div class="glass p-5 rounded-xl border-t-4 border-slate-700"><div class="skel rounded mb-3" style="height:.8rem;width:40%"></div>'+Array(4).fill('<div class="skel rounded mb-2" style="height:.7rem;width:90%"></div>').join('')+'</div>').join('')}
                </div>`;
        }

        function renderError(d) {
            document.getElementById('statusDot').className = 'w-2.5 h-2.5 rounded-full bg-red-500 live';
            document.getElementById('statusText').className = 'text-sm font-bold text-red-400';
            document.getElementById('statusText').innerText = 'UNREACHABLE';
            document.getElementById('hostline').innerText = d.host || '';
            document.getElementById('content').innerHTML = `
                <div class="glass p-8 rounded-xl border-l-4 border-red-500 text-center">
                    <p class="text-red-400 font-bold text-lg mb-2">Elasticsearch is not responding</p>
                    <p class="text-slate-400 text-sm font-mono">${d.error || 'unknown error'}</p>
                </div>`;
        }

        function render(d) {
            document.getElementById('refreshTime').innerText = 'Updated ' + new Date(d.fetched).toLocaleTimeString();
            if (!d.ok) { renderError(d); return; }

            const c = d.cluster || {}, s = d.stats || {}, tot = d.totals || {}, rates = d.rates || {};
            const st = c.status;
            document.getElementById('statusDot').className = 'w-2.5 h-2.5 rounded-full ' + stDot(st) + ' live';
            document.getElementById('statusText').className = 'text-sm font-bold ' + stColor(st);
            document.getElementById('statusText').innerText = (st || 'unknown').toUpperCase();
            document.getElementById('hostline').innerText =
                `${c.name || d.host} · ES ${c.version || '?'} · Lucene ${c.lucene_version || '?'} · ${num(c.nodes)} node(s)`;

            // ---- top stats ----
            const stats = `<div class="grid grid-cols-2 md:grid-cols-4 gap-6 mb-8">
                ${stat('Cluster status', (st || '—').toUpperCase(), stColor(st), stBorder(st), `${num(c.active_shards_percent != null ? +c.active_shards_percent.toFixed(1) : null)}% shards active`)}
                ${stat('Nodes', num(c.nodes), 'text-white', 'border-teal-500', `${num(c.data_nodes)} data node(s)`)}
                ${stat('Documents', num(s.docs_count), 'text-white', 'border-sky-500', `${num(s.indices_count)} indices · ${num(s.docs_deleted)} deleted`)}
                ${stat('Store size', bytes(s.store_bytes), 'text-white', 'border-indigo-500', `${num(s.shards_total)} shards (${num(s.shards_primaries)} pri)`)}
            </div>`;

            // ---- saturation / throughput heroes ----
            const nodes = d.nodes || [];
            const maxHeap = nodes.length ? Math.max(...nodes.map(n => n.heap_pct ?? 0)) : (rates.heap_pct ?? null);
            const maxCpu = nodes.length ? Math.max(...nodes.map(n => n.cpu_pct ?? 0)) : (rates.cpu_pct ?? null);
            const rejected = (tot.search_rejected ?? 0) + (tot.write_rejected ?? 0);
            const heroes = `<div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-4">
                ${stat('Search rate', rates.search_qps != null ? rates.search_qps.toFixed(1) + ' q/s' : '—', 'text-emerald-400', 'border-emerald-500', 'queries/sec (live)')}
                ${stat('Index rate', rates.index_qps != null ? rates.index_qps.toFixed(1) + ' /s' : '—', 'text-sky-400', 'border-sky-500', 'docs indexed/sec')}
                ${stat('Max heap', pct(maxHeap), satColor(maxHeap,75,90), satBorder(maxHeap,75,90), 'busiest node JVM')}
                ${stat('Unassigned', num(c.unassigned_shards), badColor(c.unassigned_shards), badBorder(c.unassigned_shards), `${num(rejected)} pool rejection(s)`)}
            </div>`;

            const trend = `<div class="glass p-5 rounded-xl border-t-4 border-teal-500 shadow-md mb-8">
                <div class="flex justify-between items-center mb-3 flex-wrap gap-2">
                    <div class="flex items-center gap-4 flex-wrap">
                        <h3 class="text-xs uppercase tracking-wider font-bold text-slate-400">Saturation trend</h3>
                        <span class="flex items-center gap-1.5 text-xs text-slate-400"><span class="inline-block w-3 h-[2px]" style="background:#2dd4bf"></span>heap %</span>
                        <span class="flex items-center gap-1.5 text-xs text-slate-400"><span class="inline-block w-3 h-[2px]" style="background:#a78bfa"></span>cpu %</span>
                    </div>
                    <div class="flex gap-1.5">${rangeButtons()}</div>
                </div>
                <div id="trendChart"></div>
                <div class="flex justify-between text-[10px] text-slate-500 mt-1" id="trendAxis"></div>
            </div>`;

            const perfSection = `<div class="mb-2"><h2 class="text-xl font-bold text-white flex items-center"><span class="w-2 h-6 bg-teal-500 rounded-full mr-3"></span>Cluster load</h2>
                <p class="text-xs text-slate-500 mt-1 ml-5">Live search / index rates (per-cycle deltas) and the busiest node's JVM heap. The chart trends max heap & CPU across nodes.</p></div>
                <div class="mt-4">${heroes}${trend}</div>`;

            // ---- detail cards ----
            const cards = [];
            cards.push(card('Shard allocation', stBorder(st),
                row('Active primary', num(c.active_primary_shards)) +
                row('Active', num(c.active_shards)) +
                row('Relocating', num(c.relocating_shards)) +
                row('Initializing', num(c.initializing_shards)) +
                row('Unassigned', `<span class="${badColor(c.unassigned_shards)}">${num(c.unassigned_shards)}</span>`) +
                row('Delayed unassigned', num(c.delayed_unassigned_shards)) +
                row('Active shards %', c.active_shards_percent != null ? c.active_shards_percent.toFixed(1) + '%' : '—') +
                row('Pending tasks', num(c.pending_tasks)) +
                row('Max task wait', c.max_task_wait_ms != null ? c.max_task_wait_ms + ' ms' : '—')
            ));
            cards.push(card('Cluster', 'border-teal-500',
                row('Name', c.name || '—') +
                row('Version', c.version || '—') +
                row('Lucene', c.lucene_version || '—') +
                row('Status', `<span class="${stColor(st)}">${(st||'—').toUpperCase()}</span>`) +
                row('Nodes', num(c.nodes)) +
                row('Data nodes', num(c.data_nodes)) +
                row('Node versions', (s.node_versions||[]).join(', ') || '—')
            ));
            cards.push(card('Resources', 'border-indigo-500',
                row('JVM heap', `${bytes(s.jvm_heap_used_bytes)} / ${bytes(s.jvm_heap_max_bytes)}`) +
                row('OS memory used', pct(s.os_mem_used_pct)) +
                row('OS memory total', bytes(s.os_mem_total_bytes)) +
                row('Disk free', `${bytes(s.fs_available_bytes)} / ${bytes(s.fs_total_bytes)}`) +
                row('Process CPU', pct(s.process_cpu_pct)) +
                row('Segments', `${num(s.segments_count)} · ${bytes(s.segments_bytes)}`) +
                row('Fielddata', bytes(s.fielddata_bytes)) +
                row('Query cache', bytes(s.query_cache_bytes))
            ));
            const cardsHtml = `<div class="mb-2"><h2 class="text-xl font-bold text-white flex items-center"><span class="w-2 h-6 bg-indigo-500 rounded-full mr-3"></span>Health detail</h2></div>
                <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4 mt-4 mb-8">${cards.join('')}</div>`;

            // ---- nodes table ----
            const nodeRows = nodes.map(n => {
                const sp = n.thread_pools?.search || {}, wp = n.thread_pools?.write || n.thread_pools?.bulk || {};
                const breakTripped = Object.values(n.breakers || {}).reduce((a,b) => a + (b.tripped||0), 0);
                return `<tr class="border-b border-slate-800/50 hover:bg-slate-800/60 transition-colors">
                    <td class="py-3 px-4 font-bold text-white">${n.name}<div class="text-[10px] text-slate-500 font-normal">${(n.roles||[]).join(' · ') || '—'}</div></td>
                    <td class="py-3 px-4 text-right ${satColor(n.heap_pct,75,90)}">${pct(n.heap_pct)}</td>
                    <td class="py-3 px-4 text-right ${satColor(n.cpu_pct,80,95)}">${pct(n.cpu_pct)}</td>
                    <td class="py-3 px-4 text-right text-slate-300">${n.load_1m != null ? n.load_1m.toFixed(2) : '—'}</td>
                    <td class="py-3 px-4 text-right text-slate-400">${num(n.gc_young_count)} / ${num(n.gc_old_count)}</td>
                    <td class="py-3 px-4 text-right ${badColor(sp.rejected)}">${num(sp.queue)} / ${num(sp.rejected)}</td>
                    <td class="py-3 px-4 text-right ${badColor(wp.rejected)}">${num(wp.queue)} / ${num(wp.rejected)}</td>
                    <td class="py-3 px-4 text-right ${badColor(breakTripped)}">${num(breakTripped)}</td>
                    <td class="py-3 px-4 text-right text-slate-400">${num(n.open_fds)}</td>
                </tr>`;
            }).join('') || '<tr><td colspan="9" class="text-center py-8 text-slate-500">No node stats.</td></tr>';
            const nodeTable = `<div class="mb-2"><h2 class="text-xl font-bold text-white flex items-center"><span class="w-2 h-6 bg-emerald-500 rounded-full mr-3"></span>Nodes</h2>
                <p class="text-xs text-slate-500 mt-1 ml-5">queue / rejected counts are cumulative since node start — a rising rejected count signals backpressure.</p></div>
                <div class="glass rounded-xl shadow-xl overflow-x-auto mt-4 mb-8">
                    <table class="w-full text-left border-collapse text-sm">
                        <thead class="bg-slate-900"><tr class="text-xs uppercase tracking-wide text-slate-500 border-b border-slate-700">
                            <th class="py-4 px-4">Node</th><th class="py-4 px-4 text-right">Heap</th><th class="py-4 px-4 text-right">CPU</th>
                            <th class="py-4 px-4 text-right">Load 1m</th><th class="py-4 px-4 text-right">GC y/o</th>
                            <th class="py-4 px-4 text-right">Search q/rej</th><th class="py-4 px-4 text-right">Write q/rej</th>
                            <th class="py-4 px-4 text-right">Breakers</th><th class="py-4 px-4 text-right">FDs</th>
                        </tr></thead><tbody>${nodeRows}</tbody>
                    </table>
                </div>`;

            // ---- indices table ----
            const idxRows = (d.indices||[]).map(i => {
                const dot = i.health==='green'?'bg-emerald-400':i.health==='yellow'?'bg-amber-400':i.health==='red'?'bg-red-500':'bg-slate-500';
                return `<tr class="border-b border-slate-800/50 hover:bg-slate-800/60 transition-colors">
                    <td class="py-3 px-4 font-semibold text-white"><span class="inline-block w-2 h-2 rounded-full ${dot} mr-2"></span>${i.index}${i.status && i.status!=='open' ? ` <span class="text-slate-500">(${i.status})</span>` : ''}</td>
                    <td class="py-3 px-4 text-right text-slate-300">${num(i.pri)} / ${num(i.rep)}</td>
                    <td class="py-3 px-4 text-right text-slate-300">${num(i.docs)}</td>
                    <td class="py-3 px-4 text-right text-slate-500">${num(i.deleted)}</td>
                    <td class="py-3 px-4 text-right text-emerald-300">${bytes(i.store_bytes)}</td>
                </tr>`;
            }).join('') || '<tr><td colspan="5" class="text-center py-8 text-slate-500">No indices.</td></tr>';
            const idxTable = `<div class="mb-2"><h2 class="text-xl font-bold text-white flex items-center"><span class="w-2 h-6 bg-sky-500 rounded-full mr-3"></span>Indices</h2>
                <p class="text-xs text-slate-500 mt-1 ml-5">${(d.indices||[]).length} indices · largest first</p></div>
                <div class="glass rounded-xl shadow-xl overflow-x-auto mt-4">
                    <table class="w-full text-left border-collapse text-sm">
                        <thead class="bg-slate-900"><tr class="text-xs uppercase tracking-wide text-slate-500 border-b border-slate-700">
                            <th class="py-4 px-4">Index</th><th class="py-4 px-4 text-right">Pri / Rep</th>
                            <th class="py-4 px-4 text-right">Docs</th><th class="py-4 px-4 text-right">Deleted</th><th class="py-4 px-4 text-right">Store</th>
                        </tr></thead><tbody>${idxRows}</tbody>
                    </table>
                </div>`;

            document.getElementById('content').innerHTML = stats + perfSection + cardsHtml + nodeTable + idxTable;
            drawTrend();
        }

        async function load() {
            try {
                const res = await fetch('/api/elastic');
                render(await res.json());
            } catch (err) {
                renderError({ error: String(err) });
            }
        }

        showSkeletons();
        loadTrend().then(load);
        setInterval(load, REFRESH_MS);
        setInterval(loadTrend, 60000);
    </script>
</body>
</html>
