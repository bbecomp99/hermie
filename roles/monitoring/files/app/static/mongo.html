<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Argus · MongoDB</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&display=swap" rel="stylesheet">
    <style>
        /* ── Argus theme: Obsidian & Bronze (a temple at night) ── */
        :root {
            --obsidian:#0b0d11; --stone:#15171d; --stone2:#1b1e26;
            --bronze:#c9a227; --bronze-hi:#e7c869; --aegean:#2a9d8f;
            --parchment:#ece6d6; --tan:#9d9482;
        }
        body {
            background:
                radial-gradient(1100px 560px at 50% -12%, rgba(201,162,39,.07), transparent 60%),
                radial-gradient(900px 520px at 100% 0%, rgba(42,157,143,.05), transparent 55%),
                var(--obsidian);
            color: var(--parchment);
            font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }
        h1, h2, .cinzel { font-family: 'Cinzel', Georgia, 'Times New Roman', serif; letter-spacing: .045em; }
        .tagline { font-family: 'Cormorant Garamond', Georgia, serif; font-style: italic; letter-spacing: .02em; }

        .glass {
            background:
                linear-gradient(180deg, rgba(255,255,255,.025), rgba(0,0,0,.12)),
                linear-gradient(145deg, var(--stone2), var(--stone));
            border: 1px solid rgba(201,162,39,.18);
            box-shadow: inset 0 1px 0 rgba(255,255,255,.045), 0 10px 28px rgba(0,0,0,.38);
        }
        .bronze { background: linear-gradient(92deg, var(--bronze-hi), var(--bronze) 55%, #9c7b1e);
                  -webkit-background-clip: text; background-clip: text; color: transparent; }
        .jade { background: linear-gradient(92deg, #6ee7b7, var(--aegean) 60%, #0f766e);
                -webkit-background-clip: text; background-clip: text; color: transparent; }

        .cornice {
            height: 12px; opacity: .85;
            background:
                linear-gradient(var(--bronze),var(--bronze)) left top/100% 1.5px no-repeat,
                linear-gradient(var(--bronze),var(--bronze)) left bottom/100% 1.5px no-repeat,
                repeating-linear-gradient(90deg, var(--bronze) 0 5px, transparent 5px 11px) center/100% 5px no-repeat;
        }
        .medallion { border: 1.5px solid rgba(201,162,39,.55); border-radius: 9999px;
                     box-shadow: inset 0 0 12px rgba(201,162,39,.18), 0 0 0 4px rgba(201,162,39,.06); }

        ::-webkit-scrollbar { width: 9px; height: 9px; }
        ::-webkit-scrollbar-track { background: rgba(0,0,0,.25); }
        ::-webkit-scrollbar-thumb { background: linear-gradient(var(--bronze),#8a6d1a); border-radius: 6px; }

        @keyframes shimmer { 0% { background-position: -800px 0; } 100% { background-position: 800px 0; } }
        .skel { background: linear-gradient(90deg, #1b1e26 25%, #2a2c1f 50%, #1b1e26 75%); background-size: 800px 100%; animation: shimmer 1.4s ease-in-out infinite; display: inline-block; }
        @keyframes pulsedot { 0%,100% { opacity: 1; } 50% { opacity: 0.35; } }
        .live { animation: pulsedot 1.6s ease-in-out infinite; }

        .kv { display:flex; justify-content:space-between; padding:.35rem 0; border-bottom:1px solid rgba(201,162,39,.10); font-size:.8rem; }
        .kv span:first-child { color: var(--tan); }
        .kv span:last-child { color:#dcd4c2; font-weight:600; font-variant-numeric: tabular-nums; }

        /* warm the neutral slate ramp → stone/parchment (keeps status colours intact) */
        .text-white{color:var(--parchment)!important}
        .text-slate-200{color:#dad2c0!important}
        .text-slate-300{color:#c4bca9!important}
        .text-slate-400{color:#9d9482!important}
        .text-slate-500{color:#857c6b!important}
        .text-slate-600{color:#6b6353!important}
        .bg-slate-900{background-color:#0f1116!important}
        .bg-slate-800{background-color:#191c23!important}
        .bg-slate-700{background-color:#23262f!important}
        .hover\:bg-slate-600:hover{background-color:#2d313c!important}
        .hover\:bg-slate-800:hover{background-color:#191c23!important}
        .border-slate-600{border-color:rgba(201,162,39,.24)!important}
        .border-slate-700{border-color:rgba(201,162,39,.16)!important}
        .border-slate-800{border-color:rgba(201,162,39,.10)!important}
    </style>
</head>
<body class="p-6 min-h-screen flex flex-col">
    <nav class="glass sticky top-0 z-50 px-6 pt-4 pb-0 mb-6 rounded-xl shadow-lg overflow-hidden">
        <div class="flex justify-between items-center">
            <div class="flex items-center gap-4">
                <a href="./index.html" class="text-slate-400 hover:text-white transition text-sm font-semibold flex items-center gap-1" title="Back to Argus">← <span class="hidden sm:inline cinzel">ARGUS</span></a>
                <span class="medallion w-11 h-11 flex items-center justify-center text-xl leading-none select-none">🍃</span>
                <div>
                    <h1 class="text-2xl font-bold jade">MongoDB</h1>
                    <p class="tagline text-sm text-slate-400 mt-0.5" id="hostline">consulting the oracle…</p>
                </div>
            </div>
            <div class="flex items-center space-x-4">
                <div class="flex items-center gap-2">
                    <span class="w-2.5 h-2.5 rounded-full bg-slate-500" id="statusDot"></span>
                    <span class="text-sm font-bold text-slate-400" id="statusText">…</span>
                </div>
                <p class="text-sm text-slate-400" id="refreshTime"></p>
                <button onclick="load()" class="bg-slate-700 hover:bg-slate-600 text-white text-sm font-semibold py-2 px-3 rounded-lg transition shadow-md" style="border:1px solid rgba(201,162,39,.25)">Refresh ↻</button>
            </div>
        </div>
        <div class="cornice mt-4"></div>
    </nav>

    <main class="w-full flex-grow" id="content"></main>

    <script>
        const REFRESH_MS = 5000;
        let prev = null;          // previous snapshot for rate/latency deltas
        let trendRange = 1;       // hours shown in the latency trend chart
        let trendData = [];       // [{ts, write_ms, read_ms}] from persisted history
        const RANGES = [{ h: 1, l: '1H' }, { h: 24, l: '1D' }, { h: 168, l: '1W' }, { h: 720, l: '1M' }];

        // ms threshold → text/border colour (green < g, amber < a, else red)
        const msColor = (v, g, a) => v == null ? 'text-slate-400' : v < g ? 'text-emerald-400' : v < a ? 'text-amber-400' : 'text-red-400';
        const msBorder = (v, g, a) => v == null ? 'border-slate-600' : v < g ? 'border-emerald-500' : v < a ? 'border-amber-500' : 'border-red-500';

        function ticketBorder(tq) {
            if (!tq || tq.available == null) return 'border-slate-600';
            if (tq.available === 0 || (tq.queueLength || 0) > 0) return 'border-red-500';
            if (tq.totalTickets && tq.available < 0.2 * tq.totalTickets) return 'border-amber-500';
            return 'border-emerald-500';
        }
        function ticketColor(tq) {
            if (!tq || tq.available == null) return 'text-slate-400';
            if (tq.available === 0 || (tq.queueLength || 0) > 0) return 'text-red-400';
            if (tq.totalTickets && tq.available < 0.2 * tq.totalTickets) return 'text-amber-400';
            return 'text-emerald-400';
        }

        function perfHero(label, value, valueColor, accent, sub) {
            return `<div class="glass p-5 rounded-xl border-b-4 ${accent} shadow-md">
                <p class="text-xs uppercase text-slate-400 mb-1 font-semibold tracking-wider">${label}</p>
                <p class="text-2xl font-bold ${valueColor} leading-tight">${value}</p>
                <p class="text-xs text-slate-500 mt-1">${sub}</p></div>`;
        }

        // ---- range-selectable latency trend (write + read, from history) ----
        async function loadTrend() {
            try {
                const r = await fetch('/api/mongo/history?hours=' + trendRange);
                trendData = await r.json();
            } catch (e) { trendData = []; }
            drawTrend();
        }
        function setRange(h) { trendRange = h; loadTrend(); }
        window.setRange = setRange;

        function rangeButtons() {
            return RANGES.map(r => {
                const on = r.h === trendRange;
                return `<button onclick="setRange(${r.h})" class="px-3 py-1 rounded-lg text-xs font-bold transition ${on ? 'bg-emerald-600 text-white shadow' : 'bg-slate-700 text-slate-300 hover:bg-slate-600'}">${r.l}</button>`;
            }).join('');
        }

        const fmtTs = (ts) => {
            const d = new Date(ts * 1000);
            return trendRange <= 24
                ? d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
                : d.toLocaleString([], { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
        };

        function _line(series, max, W, H) {
            const n = trendData.length;
            if (n < 2) return '';
            const step = W / (n - 1);
            const pts = [];
            trendData.forEach((d, i) => {
                const v = d[series];
                if (v == null) return;
                pts.push(`${(i * step).toFixed(1)},${(H - (v / max) * (H - 4) - 2).toFixed(1)}`);
            });
            return pts.join(' ');
        }

        function drawTrend() {
            const el = document.getElementById('trendChart');
            if (!el) return;
            const peakEl = document.getElementById('trendPeak');
            const axisEl = document.getElementById('trendAxis');
            const wv = trendData.map(d => d.write_ms).filter(v => v != null);
            const rv = trendData.map(d => d.read_ms).filter(v => v != null);
            if (wv.length + rv.length < 2) {
                el.innerHTML = '<div class="h-32 flex items-center justify-center text-slate-600 text-sm">no samples in this range yet…</div>';
                if (peakEl) peakEl.innerText = '';
                if (axisEl) axisEl.innerHTML = '';
                return;
            }
            const max = Math.max(...wv, ...rv, 0.1);
            const W = 600, H = 130;
            const wpts = _line('write_ms', max, W, H), rpts = _line('read_ms', max, W, H);
            el.innerHTML = `<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" class="w-full h-32">
                <line x1="0" y1="2" x2="${W}" y2="2" stroke="#334155" stroke-width="0.5" vector-effect="non-scaling-stroke"/>
                <line x1="0" y1="${H/2}" x2="${W}" y2="${H/2}" stroke="#1e293b" stroke-width="0.5" vector-effect="non-scaling-stroke"/>
                ${rpts ? `<polyline fill="none" stroke="#38bdf8" stroke-width="1.5" vector-effect="non-scaling-stroke" points="${rpts}"/>` : ''}
                ${wpts ? `<polyline fill="none" stroke="#34d399" stroke-width="1.5" vector-effect="non-scaling-stroke" points="${wpts}"/>` : ''}
            </svg>`;
            if (peakEl) peakEl.innerText = `0–${max.toFixed(max < 10 ? 1 : 0)} ms · ${trendData.length} pts`;
            if (axisEl) axisEl.innerHTML = `<span>${fmtTs(trendData[0].ts)}</span><span>${fmtTs(trendData[trendData.length - 1].ts)}</span>`;
        }

        // ---- host CPU/mem trend (fixed 0–100% scale, gold CPU / blue memory) ----
        let hostRange = 1;
        let hostData = [];
        async function loadHostTrend() {
            try { const r = await fetch('/api/host/history?hours=' + hostRange); hostData = await r.json(); }
            catch (e) { hostData = []; }
            drawHostTrend();
        }
        function setHostRange(h) { hostRange = h; loadHostTrend(); }
        window.setHostRange = setHostRange;
        function hostRangeButtons() {
            return RANGES.map(r => {
                const on = r.h === hostRange;
                return `<button onclick="setHostRange(${r.h})" class="px-3 py-1 rounded-lg text-xs font-bold transition ${on ? 'bg-amber-600 text-white shadow' : 'bg-slate-700 text-slate-300 hover:bg-slate-600'}">${r.l}</button>`;
            }).join('');
        }
        const fmtTsH = (ts) => {
            const d = new Date(ts * 1000);
            return hostRange <= 24 ? d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
                : d.toLocaleString([], { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
        };
        function _lineH(series, W, H) {
            const n = hostData.length;
            if (n < 2) return '';
            const step = W / (n - 1);
            const pts = [];
            hostData.forEach((d, i) => {
                const v = d[series];
                if (v == null) return;
                pts.push(`${(i * step).toFixed(1)},${(H - (v / 100) * (H - 4) - 2).toFixed(1)}`);
            });
            return pts.join(' ');
        }
        function _drawHostChart(elId, axisId, series, color) {
            const el = document.getElementById(elId);
            if (!el) return;
            const axisEl = document.getElementById(axisId);
            const vals = hostData.map(d => d[series]).filter(v => v != null);
            if (vals.length < 2) {
                el.innerHTML = '<div class="h-28 flex items-center justify-center text-slate-600 text-sm">no samples in this range yet…</div>';
                if (axisEl) axisEl.innerHTML = '';
                return;
            }
            const W = 600, H = 110;
            const y = (p) => (H - (p / 100) * (H - 4) - 2).toFixed(1);
            const cur = vals[vals.length - 1], peak = Math.max(...vals);
            el.innerHTML = `<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" class="w-full h-28">
                ${[25, 50, 75].map(p => `<line x1="0" y1="${y(p)}" x2="${W}" y2="${y(p)}" stroke="#1e293b" stroke-width="0.5" vector-effect="non-scaling-stroke"/>`).join('')}
                <polyline fill="none" stroke="${color}" stroke-width="1.5" vector-effect="non-scaling-stroke" points="${_lineH(series, W, H)}"/>
            </svg>`;
            if (axisEl) axisEl.innerHTML = `<span>${fmtTsH(hostData[0].ts)}</span><span>now ${cur.toFixed(1)}% · peak ${peak.toFixed(1)}%</span><span>${fmtTsH(hostData[hostData.length - 1].ts)}</span>`;
        }
        function drawHostTrend() {
            _drawHostChart('cpuChart', 'cpuAxis', 'cpu_pct', '#e7c869');
            _drawHostChart('memChart', 'memAxis', 'mem_pct', '#38bdf8');
        }

        const num = (n) => (n === null || n === undefined) ? '—' : new Intl.NumberFormat('en-US').format(n);
        const bytes = (n) => {
            if (n === null || n === undefined) return '—';
            const u = ['B','KB','MB','GB','TB','PB']; let i = 0; n = Number(n);
            while (n >= 1024 && i < u.length - 1) { n /= 1024; i++; }
            return n.toFixed(n < 10 && i > 0 ? 2 : 0) + ' ' + u[i];
        };
        const dur = (s) => {
            if (s === null || s === undefined) return '—';
            s = Math.floor(s); const d = Math.floor(s/86400); s -= d*86400;
            const h = Math.floor(s/3600); s -= h*3600; const m = Math.floor(s/60);
            return (d ? d+'d ' : '') + (h || d ? h+'h ' : '') + m + 'm';
        };
        function card(title, accent, rowsHtml) {
            return `<div class="glass p-5 rounded-xl border-t-4 ${accent} shadow-md">
                <h3 class="text-xs uppercase tracking-wider font-bold text-slate-400 mb-3">${title}</h3>
                <div>${rowsHtml}</div></div>`;
        }
        const row = (k, v, extra='') => `<div class="kv"><span>${k}</span><span>${v}${extra}</span></div>`;

        function stat(label, value, accent, sub='') {
            return `<div class="glass p-5 rounded-xl border-b-4 ${accent} shadow-md">
                <p class="text-xs uppercase text-slate-400 mb-1 font-semibold tracking-wider">${label}</p>
                <p class="text-2xl font-bold text-white leading-tight">${value}</p>
                ${sub ? `<p class="text-xs text-slate-500 mt-1">${sub}</p>` : ''}</div>`;
        }

        function showSkeletons() {
            document.getElementById('content').innerHTML = `
                <div class="grid grid-cols-2 md:grid-cols-4 gap-6 mb-8">
                    ${Array(4).fill('<div class="glass p-5 rounded-xl border-b-4 border-slate-700"><div class="skel rounded mb-2" style="height:.7rem;width:60%"></div><div class="skel rounded" style="height:1.6rem;width:50%"></div></div>').join('')}
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4">
                    ${Array(6).fill('<div class="glass p-5 rounded-xl border-t-4 border-slate-700"><div class="skel rounded mb-3" style="height:.8rem;width:40%"></div>'+Array(4).fill('<div class="skel rounded mb-2" style="height:.7rem;width:90%"></div>').join('')+'</div>').join('')}
                </div>`;
        }

        function renderError(d) {
            document.getElementById('statusDot').className = 'w-2.5 h-2.5 rounded-full bg-red-500 live';
            document.getElementById('statusText').className = 'text-sm font-bold text-red-400';
            document.getElementById('statusText').innerText = 'UNREACHABLE';
            document.getElementById('hostline').innerText = d.host || '';
            document.getElementById('content').innerHTML = `
                <div class="glass p-8 rounded-xl border-l-4 border-red-500 text-center">
                    <p class="text-red-400 font-bold text-lg mb-2">MongoDB is not responding</p>
                    <p class="text-slate-400 text-sm font-mono">${d.error || 'unknown error'}</p>
                </div>`;
        }

        function render(d) {
            document.getElementById('refreshTime').innerText = 'Updated ' + new Date(d.fetched).toLocaleTimeString();
            if (!d.ok) { renderError(d); prev = null; return; }

            document.getElementById('statusDot').className = 'w-2.5 h-2.5 rounded-full bg-emerald-400 live';
            document.getElementById('statusText').className = 'text-sm font-bold text-emerald-400';
            document.getElementById('statusText').innerText = 'ONLINE';
            const topo = d.topology.isReplicaSet ? `replSet ${d.topology.setName}` : 'standalone';
            document.getElementById('hostline').innerText = `${d.host} · ${topo} · ${d.server.storageEngine || ''}`;

            const c = d.connections, op = d.opcounters, net = d.network, mem = d.mem, wt = d.wiredTiger;
            const usedPct = (wt.cacheBytes && wt.cacheMaxBytes) ? Math.round(100 * wt.cacheBytes / wt.cacheMaxBytes) : null;

            const stats = `<div class="grid grid-cols-2 md:grid-cols-4 gap-6 mb-8">
                ${stat('Version', d.server.version || '—', 'border-emerald-500', d.server.process || '')}
                ${stat('Uptime', dur(d.server.uptime), 'border-teal-500', 'since restart')}
                ${stat('Connections', num(c.current), 'border-blue-500', `${num(c.available)} available`)}
                ${stat('Databases', num(d.databases.length), 'border-cyan-500', bytes(d.totalDbSize) + ' on disk')}
            </div>`;

            // ---- Latency & Saturation (the crucial bit) ----
            const ol = d.opLatencies, q = d.queues, fc = d.flowControl || {};
            const pp = prev;                      // previous snapshot (or null)
            const wall = pp ? (Date.now() - pp.t) / 1000 : 0;

            // Live avg latency over the interval ONLY (Δlatency/Δops). We do NOT
            // fall back to the lifetime average: opLatencies.reads includes
            // getmore (idle tailable-cursor waits counted as latency), so the
            // lifetime read avg is wildly inflated (~seconds) and misleading.
            // null = no ops of that kind in this interval ("idle").
            const avgMs = (cur, pv) => {
                if (!pp || !pv) return null;
                const dOps = (cur.ops || 0) - (pv.ops || 0);
                const dLat = (cur.latency || 0) - (pv.latency || 0);
                return (dOps > 0 && dLat >= 0) ? dLat / dOps / 1000 : null;
            };
            const writeMs = avgMs(ol.writes, pp && pp.ol.writes);
            const readMs  = avgMs(ol.reads,  pp && pp.ol.reads);
            const cmdMs   = avgMs(ol.commands, pp && pp.ol.commands);

            let diskMs = null;
            if (pp && wt.appDiskReadCount != null) {
                const dc = wt.appDiskReadCount - pp.diskCount, dt = wt.appDiskReadTimeUs - pp.diskTimeUs;
                if (dc > 0 && dt >= 0) diskMs = dt / dc / 1000;
            }
            if (diskMs === null && wt.appDiskReadCount) diskMs = wt.appDiskReadTimeUs / wt.appDiskReadCount / 1000;

            const ratePer = (cur, pv) => (pp && pv != null && wall > 0) ? Math.max(0, cur - pv) / wall : null;
            const pagesReadS = ratePer(wt.pagesReadIntoCache, pp && pp.pagesRead);
            const wQueueWaitMsS = (pp && wall > 0) ? Math.max(0, (q.write.totalTimeQueuedMicros || 0) - pp.qWriteWait) / 1000 / wall : null;
            const throttleMsS = (pp && fc.timeAcquiringMicros != null && wall > 0) ? Math.max(0, fc.timeAcquiringMicros - pp.flowAcquire) / 1000 / wall : null;
            const dirtyPct = (wt.cacheDirtyBytes != null && wt.cacheMaxBytes) ? 100 * wt.cacheDirtyBytes / wt.cacheMaxBytes : null;

            const heroes = `<div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-4">
                ${perfHero('Write latency', writeMs == null ? '—' : writeMs.toFixed(2) + ' ms', msColor(writeMs, 5, 20), msBorder(writeMs, 5, 20), writeMs == null ? 'idle · no writes' : 'live avg/op')}
                ${perfHero('Read latency', readMs == null ? '—' : readMs.toFixed(2) + ' ms', msColor(readMs, 10, 50), msBorder(readMs, 10, 50), readMs == null ? 'idle · no reads' : 'live avg/op · incl. getmore')}
                ${perfHero('Disk read', diskMs == null ? '—' : diskMs.toFixed(2) + ' ms', msColor(diskMs, 5, 15), msBorder(diskMs, 5, 15), 'per page from disk' + (pagesReadS != null ? ` · ${pagesReadS.toFixed(0)}/s` : ''))}
                ${perfHero('Storage queue', `${num(q.write.out)}/${num(q.write.totalTickets)}`, ticketColor(q.write), ticketBorder(q.write), `write tickets · queue ${num(q.write.queueLength)}`)}
            </div>`;

            const trend = `<div class="glass p-5 rounded-xl border-t-4 border-emerald-500 shadow-md mb-8">
                <div class="flex justify-between items-center mb-3 flex-wrap gap-2">
                    <div class="flex items-center gap-4 flex-wrap">
                        <h3 class="text-xs uppercase tracking-wider font-bold text-slate-400">Latency trend</h3>
                        <span class="flex items-center gap-1.5 text-xs text-slate-400"><span class="inline-block w-3 h-[2px] bg-emerald-400"></span>write</span>
                        <span class="flex items-center gap-1.5 text-xs text-slate-400"><span class="inline-block w-3 h-[2px] bg-sky-400"></span>read</span>
                        <span class="text-xs text-slate-500" id="trendPeak"></span>
                    </div>
                    <div class="flex gap-1.5">${rangeButtons()}</div>
                </div>
                <div id="trendChart"></div>
                <div class="flex justify-between text-[10px] text-slate-500 mt-1" id="trendAxis"></div>
                <div class="grid grid-cols-2 md:grid-cols-4 gap-x-6 mt-3">
                    ${row('Cmd latency', cmdMs == null ? '—' : cmdMs.toFixed(2) + ' ms')}
                    ${row('Dirty cache', dirtyPct == null ? '—' : dirtyPct.toFixed(1) + '%')}
                    ${row('Write queue wait', wQueueWaitMsS == null ? '—' : wQueueWaitMsS.toFixed(1) + ' ms/s')}
                    ${row('Flow throttle', (throttleMsS == null ? '—' : throttleMsS.toFixed(1) + ' ms/s') + (fc.isLagged ? ' <span class="text-red-400">⚠ lagged</span>' : ''))}
                </div>
            </div>`;

            const latSection = `<div class="mb-2"><h2 class="text-xl font-bold text-white flex items-center"><span class="w-2 h-6 bg-emerald-500 rounded-full mr-3"></span>Latency &amp; Saturation</h2>
                <p class="text-xs text-slate-500 mt-1 ml-5">rising latency or a non-empty storage queue = the engine is starved on disk/CPU — apps will feel it first here</p></div>
                <div class="mt-4">${heroes}${trend}</div>`;

            // ---- Host CPU & Memory (collected over SSH from the DB box) ----
            const hmx = d.hostMetrics || null;
            let hostSection = '';
            if (hmx) {
                const cpuP = hmx.cpu_pct, memP = hmx.mem_pct;
                const usedGB = hmx.mem_used_kb ? (hmx.mem_used_kb / 1048576).toFixed(1) : null;
                const totGB = hmx.mem_total_kb ? (hmx.mem_total_kb / 1048576).toFixed(1) : null;
                const availGB = hmx.mem_avail_kb ? (hmx.mem_avail_kb / 1048576).toFixed(1) : null;
                const cpuC = cpuP == null ? 'text-slate-400' : cpuP < 60 ? 'text-emerald-400' : cpuP < 85 ? 'text-amber-400' : 'text-red-400';
                const cpuB = cpuP == null ? 'border-slate-600' : cpuP < 60 ? 'border-emerald-500' : cpuP < 85 ? 'border-amber-500' : 'border-red-500';
                const memC = memP == null ? 'text-slate-400' : memP < 85 ? 'text-emerald-400' : memP < 95 ? 'text-amber-400' : 'text-red-400';
                const memB = memP == null ? 'border-slate-600' : memP < 85 ? 'border-emerald-500' : memP < 95 ? 'border-amber-500' : 'border-red-500';
                const hostHeroes = `<div class="grid grid-cols-2 gap-4 mb-4">
                    ${perfHero('CPU', cpuP == null ? '—' : cpuP.toFixed(1) + ' %', cpuC, cpuB, 'all cores · live')}
                    ${perfHero('Memory', memP == null ? '—' : memP.toFixed(1) + ' %', memC, memB, usedGB ? `${usedGB} / ${totGB} GB · ${availGB} GB free` : 'used')}
                </div>`;
                const hostCharts = `<div class="flex justify-end mb-3"><div class="flex gap-1.5">${hostRangeButtons()}</div></div>
                    <div class="grid grid-cols-1 lg:grid-cols-2 gap-4 mb-8">
                        <div class="glass p-5 rounded-xl border-t-4 border-amber-500 shadow-md">
                            <h3 class="text-xs uppercase tracking-wider font-bold text-slate-400 mb-3"><span class="inline-block w-3 h-[2px] align-middle mr-1.5" style="background:#e7c869"></span>CPU usage</h3>
                            <div id="cpuChart"></div>
                            <div class="flex justify-between text-[10px] text-slate-500 mt-1" id="cpuAxis"></div>
                        </div>
                        <div class="glass p-5 rounded-xl border-t-4 border-sky-500 shadow-md">
                            <h3 class="text-xs uppercase tracking-wider font-bold text-slate-400 mb-3"><span class="inline-block w-3 h-[2px] align-middle mr-1.5 bg-sky-400"></span>Memory usage</h3>
                            <div id="memChart"></div>
                            <div class="flex justify-between text-[10px] text-slate-500 mt-1" id="memAxis"></div>
                        </div>
                    </div>`;
                hostSection = `<div class="mb-2"><h2 class="text-xl font-bold text-white flex items-center"><span class="w-2 h-6 bg-amber-500 rounded-full mr-3"></span>Host${hmx.host ? ' · ' + hmx.host : ''}</h2>
                    <p class="text-xs text-slate-500 mt-1 ml-5">CPU saturation or vanishing free memory on the DB box drags every query — the old-school early warning</p></div>
                    <div class="mt-4">${hostHeroes}${hostCharts}</div>`;
            }

            const cards = [];

            cards.push(card('Topology / Server', 'border-emerald-500',
                row('Role', d.topology.isReplicaSet ? (d.topology.isWritablePrimary ? 'PRIMARY' : (d.topology.secondary ? 'SECONDARY' : 'member')) : 'standalone') +
                row('Storage engine', d.server.storageEngine || '—') +
                row('Process', d.server.process || '—') +
                row('PID', num(d.server.pid)) +
                row('Wire version', num(d.server.maxWireVersion)) +
                row('Read-only', d.server.readOnly ? 'yes' : 'no')
            ));

            cards.push(card('Connections', 'border-blue-500',
                row('Current', num(c.current)) +
                row('Available', num(c.available)) +
                row('Active', num(c.active)) +
                row('Threaded', num(c.threaded)) +
                row('Total created', num(c.totalCreated))
            ));

            cards.push(card('Operations (total · rate)', 'border-indigo-500',
                ['insert','query','update','delete','getmore','command'].map(k => {
                    let r = '';
                    if (prev && prev.opcounters) {
                        const dt = (Date.now()-prev.t)/1000;
                        const dv = (op[k]||0) - (prev.opcounters[k]||0);
                        if (dt>0 && dv>=0) r = `<span class="text-emerald-400 text-[11px] ml-2">${(dv/dt).toFixed(dv/dt<10?1:0)}/s</span>`;
                    }
                    return row(k, num(op[k]), r);
                }).join('')
            ));

            const netRate = (key) => {
                if (!prev || !prev.network) return '';
                const dt=(Date.now()-prev.t)/1000; const dv=(net[key]||0)-(prev.network[key]||0);
                return (dt>0 && dv>=0) ? `<span class="text-emerald-400 text-[11px] ml-2">${bytes(dv/dt)}/s</span>` : '';
            };
            cards.push(card('Network', 'border-sky-500',
                row('Bytes in', bytes(net.bytesIn), netRate('bytesIn')) +
                row('Bytes out', bytes(net.bytesOut), netRate('bytesOut')) +
                row('Requests', num(net.numRequests), (()=>{ if(!prev||!prev.network)return''; const dt=(Date.now()-prev.t)/1000; const dv=(net.numRequests||0)-(prev.network.numRequests||0); return (dt>0&&dv>=0)?`<span class="text-emerald-400 text-[11px] ml-2">${(dv/dt).toFixed(1)}/s</span>`:''; })())
            ));

            cards.push(card('Memory', 'border-amber-500',
                row('Resident', mem.resident !== undefined ? mem.resident + ' MB' : '—') +
                row('Virtual', mem.virtual !== undefined ? mem.virtual + ' MB' : '—') +
                row('Page faults', num((d.extra_info||{}).page_faults))
            ));

            cards.push(card('WiredTiger cache', 'border-green-500',
                (usedPct !== null ? `<div class="mb-3"><div class="flex justify-between text-[11px] text-slate-400 mb-1"><span>used</span><span>${usedPct}%</span></div>
                    <div class="w-full h-2 rounded-full bg-slate-700 overflow-hidden"><div class="h-full ${usedPct>90?'bg-red-500':usedPct>75?'bg-amber-500':'bg-emerald-500'}" style="width:${usedPct}%"></div></div></div>` : '') +
                row('In cache', bytes(wt.cacheBytes)) +
                row('Max configured', bytes(wt.cacheMaxBytes)) +
                row('Dirty', bytes(wt.cacheDirtyBytes)) +
                row('Read tickets', `${num(wt.readTicketsAvail)} avail`) +
                row('Write tickets', `${num(wt.writeTicketsAvail)} avail`)
            ));

            const gl = d.globalLock || {};
            cards.push(card('Concurrency (global lock)', 'border-purple-500',
                row('Queued readers', num((gl.currentQueue||{}).readers)) +
                row('Queued writers', num((gl.currentQueue||{}).writers)) +
                row('Active readers', num((gl.activeClients||{}).readers)) +
                row('Active writers', num((gl.activeClients||{}).writers))
            ));

            cards.push(card('Storage tickets (queue depth)', ticketBorder(q.write),
                row('Read tickets', `${num(q.read.out)} out · ${num(q.read.available)} free / ${num(q.read.totalTickets)}`) +
                row('Read queue', `<span class="${(q.read.queueLength||0)>0?'text-red-400':'text-slate-200'}">${num(q.read.queueLength)}</span>`) +
                row('Write tickets', `${num(q.write.out)} out · ${num(q.write.available)} free / ${num(q.write.totalTickets)}`) +
                row('Write queue', `<span class="${(q.write.queueLength||0)>0?'text-red-400':'text-slate-200'}">${num(q.write.queueLength)}</span>`) +
                row('Max hold (delinquency)', `${num(Math.max(q.read.maxDelinquencyMillis||0, q.write.maxDelinquencyMillis||0))} ms`)
            ));

            const md = d.metricsDocument || {}, qe = d.queryExecutor || {};
            cards.push(card('Document metrics', 'border-pink-500',
                row('Inserted', num(md.inserted)) +
                row('Updated', num(md.updated)) +
                row('Deleted', num(md.deleted)) +
                row('Returned', num(md.returned)) +
                row('Index keys scanned', num(qe.scanned)) +
                row('Docs scanned', num(qe.scannedObjects))
            ));

            const as = d.asserts || {};
            cards.push(card('Asserts', 'border-red-500',
                row('Regular', num(as.regular)) +
                row('Warning', num(as.warning)) +
                row('Msg', num(as.msg)) +
                row('User', num(as.user)) +
                row('Rollovers', num(as.rollovers))
            ));

            // replica set members (if any)
            if (d.replSet && d.replSet.members) {
                cards.push(card(`Replica set · ${d.replSet.set}`, 'border-emerald-500',
                    d.replSet.members.map(m =>
                        row(m.name + (m.self ? ' (self)' : ''), `<span class="${m.stateStr==='PRIMARY'?'text-emerald-400':m.health?'text-slate-200':'text-red-400'}">${m.stateStr}</span>`)
                    ).join('')
                ));
            }

            const cardsHtml = `<div class="mb-2"><h2 class="text-xl font-bold text-white flex items-center"><span class="w-2 h-6 bg-emerald-500 rounded-full mr-3"></span>Server diagnostics</h2></div>
                <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4 mt-4 mb-8">${cards.join('')}</div>`;

            // databases table
            const dbRows = (d.databases||[]).map(db => `
                <tr class="border-b border-slate-800/50 hover:bg-slate-800/60 transition-colors">
                    <td class="py-3 px-4 font-bold text-white">${db.name}</td>
                    <td class="py-3 px-4 text-right text-slate-300">${num(db.collections)}</td>
                    <td class="py-3 px-4 text-right text-slate-300">${num(db.objects)}</td>
                    <td class="py-3 px-4 text-right text-emerald-300">${bytes(db.dataSize)}</td>
                    <td class="py-3 px-4 text-right text-slate-300">${bytes(db.storageSize)}</td>
                    <td class="py-3 px-4 text-right text-slate-300">${num(db.indexes)}</td>
                    <td class="py-3 px-4 text-right text-blue-300">${bytes(db.indexSize)}</td>
                    <td class="py-3 px-4 text-right text-slate-400">${bytes(db.sizeOnDisk)}</td>
                </tr>`).join('') || '<tr><td colspan="8" class="text-center py-8 text-slate-500">No databases reported.</td></tr>';
            const dbTable = `<div class="mb-2"><h2 class="text-xl font-bold text-white flex items-center"><span class="w-2 h-6 bg-cyan-500 rounded-full mr-3"></span>Databases</h2></div>
                <div class="glass rounded-xl shadow-xl overflow-x-auto mt-4">
                    <table class="w-full text-left border-collapse">
                        <thead class="bg-slate-900"><tr class="text-xs uppercase tracking-wide text-slate-500 border-b border-slate-700">
                            <th class="py-4 px-4">Database</th><th class="py-4 px-4 text-right">Collections</th><th class="py-4 px-4 text-right">Objects</th>
                            <th class="py-4 px-4 text-right">Data</th><th class="py-4 px-4 text-right">Storage</th><th class="py-4 px-4 text-right">Indexes</th>
                            <th class="py-4 px-4 text-right">Index size</th><th class="py-4 px-4 text-right">On disk</th>
                        </tr></thead>
                        <tbody>${dbRows}</tbody>
                    </table>
                </div>`;

            document.getElementById('content').innerHTML = stats + latSection + hostSection + cardsHtml + dbTable;
            drawTrend();      // (re)paint the latency chart from cached history
            drawHostTrend();  // (re)paint the host CPU/mem chart

            prev = {
                t: Date.now(),
                opcounters: {...op}, network: {...net},
                ol: { writes: {...ol.writes}, reads: {...ol.reads}, commands: {...ol.commands} },
                diskCount: wt.appDiskReadCount, diskTimeUs: wt.appDiskReadTimeUs,
                pagesRead: wt.pagesReadIntoCache,
                qWriteWait: q.write.totalTimeQueuedMicros || 0,
                flowAcquire: fc.timeAcquiringMicros || 0,
            };
        }

        async function load() {
            try {
                const res = await fetch('/api/mongo');
                render(await res.json());
            } catch (err) {
                renderError({ error: String(err) });
            }
        }

        showSkeletons();
        Promise.all([loadTrend(), loadHostTrend()]).then(load);  // history charts first, then live page
        setInterval(load, REFRESH_MS);       // live cards/diagnostics every 5s
        setInterval(loadTrend, 30000);       // latency history refresh (sample cadence)
        setInterval(loadHostTrend, 30000);   // host cpu/mem history refresh
    </script>
</body>
</html>
