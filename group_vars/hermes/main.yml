---
# --- Hermes agent source (NousResearch/hermes-agent) ---
hermes_repo: "https://github.com/NousResearch/hermes-agent.git"
hermes_version: "a6e47314f98cccb09f302ad649d8bec30e4b4a2d"  # pinned to the running commit; bump deliberately

# --- LLM target ---
# The agent talks to Ollama Cloud (ollama.com) over the OpenAI-compatible API.
# These keys are written into the `model:` block of ~/.hermes/config.yaml.
# `provider: custom` = generic OpenAI-compatible endpoint; `api_key` carries the
# Bearer token (ollama.com requires auth — local Ollama did not, so this field is
# new). Switched off MLX (:8080) because mlx_lm.server cannot emit structured
# tool_calls (tool_turns=0); Ollama returns real tool calls.
#
# `default` is the cloud model `qwen3-next:80b` (80B MoE) — a clean instruct/
# tool-calling model that emits structured tool_calls over the OpenAI /v1 path and
# has a 128K+ window, clearing the 64K floor Hermes Agent enforces (no Modelfile/
# num_ctx needed on cloud — the served context is the model's full window).
# Replaced the local `lfm2.5:8b-hermes` when local Ollama was retired off the 16GB
# Mac. (History: tried cloud `gpt-oss:20b` first, but it's a reasoning/harmony
# model — over /v1 ollama.com returns empty content or a raw `…assistantfinal…`
# blob instead of clean content/tool_calls, so the agent got "Empty response from
# model". qwen3-next returns proper tool_calls. Local path baked num_ctx 65536 via
# a Modelfile because the OpenAI API can't pass num_ctx; llama3.2:3b-hermes was too
# weak at tool-choice; Qwen2.5-7B capped at 32K.)
# MLX still runs on :8080 for the separately-managed ai-serve/stonks coding model.
hermes_model_default: "qwen3-next:80b"
hermes_model_provider: "custom"
hermes_model_base_url: "https://ollama.com/v1"
hermes_model_api_key: "{{ ollama_api_key }}"   # from group_vars/hermes/vault.yml

# --- Web dashboard (always-on systemd service) ---
# LAN-exposed (--insecure) on a trusted home network, same trust model as the
# MLX server. WARNING: the dashboard manages API keys/config — only bind to a
# non-localhost address on a network you fully trust.
dashboard_host: "0.0.0.0"
dashboard_port: 9119
dashboard_insecure: true        # required to bind off-localhost
dashboard_tui: true             # in-browser Chat tab (talk to the agent)

# --- Gateway (Mattermost channel) ---
# hermes matches MATTERMOST_ALLOWED_USERS by Mattermost USER ID (not username).
# This is brian's user id.
mm_allowed_users: "xbpkc5mq9jnk8mfngpjaygz5ay"

# Home channel for cron/autonomous output = Town Square (default channel,
# team CloudLogic). Mattermost channel ID, not name.
mm_home_channel: "bkkf739saif5tgzwaynhikgmho"
mm_home_channel_name: "Town Square"
# mm_bot_token lives in group_vars/hermes/vault.yml (gitignored)
