---
- name: Deploy and configure the Hermes agent
  hosts: hermes
  gather_facts: true

  roles:
    - hermes
    - dashboard
    - mattermost
    - gateway
    - { role: homeassistant, tags: ['homeassistant', 'ha'] }
    - { role: weather, tags: ['weather'] }
    - { role: toolsets, tags: ['toolsets'] }
    - { role: stockcheck, tags: ['stockcheck'] }
    - { role: monitoring, tags: ['monitoring'] }
